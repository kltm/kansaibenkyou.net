name: CI + Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:

  validate:
    name: LinkML schema validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linkml
        run: pip install linkml

      - name: Validate conversations
        run: linkml-validate --schema schema/kbnet.yaml --target-class ConversationExample data/conversations/*.yaml

      - name: Validate words
        run: linkml-validate --schema schema/kbnet.yaml --target-class Word data/words/*.yaml

      - name: Validate grammar points
        run: linkml-validate --schema schema/kbnet.yaml --target-class GrammarPoint data/grammar_points/*.yaml

      - name: Validate real conversations
        run: linkml-validate --schema schema/kbnet.yaml --target-class RealConversation data/real_conversations/*.yaml

      - name: Validate phonology topics
        run: linkml-validate --schema schema/kbnet.yaml --target-class PhonologyTopic data/phonology_topics/*.yaml

      - name: Validate pages
        run: linkml-validate --schema schema/kbnet.yaml --target-class Page data/pages/*.yaml

  build:
    name: Jekyll build
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Index site with Pagefind
        run: |
          sudo chmod -R a+w _site
          npx pagefind@latest --site _site

      - uses: actions/upload-pages-artifact@v3

  deploy:
    name: Deploy to GitHub Pages
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
