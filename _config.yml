title: Kansaibenkyou.net
subtitle: A learning resource for Kansai-ben (関西弁)
description: >-
  A learning resource for Kansai-ben (関西弁), the family of Japanese
  dialects spoken in the Kansai region. Authored by Keiko Yukawa.
logo: /assets/images/takkun.png
lang: ja
baseurl: "/kansaibenkyou.net"
url: "https://kltm.github.io"

# Minimal Mistakes theme (via remote_theme for GH Pages compatibility)
remote_theme: mmistakes/minimal-mistakes
minimal_mistakes_skin: "default"

# GoatCounter analytics
goatcounter_site: kansaibenkyou

# Author sidebar
author:
  name: Keiko Yukawa
  bio: >-
    A learning resource for Kansai-ben, the family of Japanese dialects
    spoken in the Kansai region.
  avatar: /assets/images/takkun.png

markdown: kramdown
kramdown:
  input: GFM

data_dir: data

# MM plugins (allowlisted on GH Pages)
plugins:
  - jekyll-remote-theme
  - jekyll-include-cache

# Collections
collections:
  conversations:
    output: true
    permalink: /example-conversations/:name/
  words:
    output: true
    permalink: /words/:name/
  grammar_points:
    output: true
    permalink: /grammar_points/:name/
  real_conversations:
    output: true
    permalink: /real_conversations/:name/
  phonology_topics:
    output: true
    permalink: /phonology/:name/
  pages:
    output: true
    permalink: /:name/
  taxonomy_terms:
    output: true
    permalink: /taxonomy/term/:name/

# MM defaults — apply sidebar and breadcrumbs to all pages
defaults:
  - scope:
      path: ""
    values:
      layout: single
      sidebar:
        nav: "site-nav"
      breadcrumbs: true
  - scope:
      path: ""
      type: "conversations"
    values:
      layout: conversation
      sidebar:
        nav: "site-nav"
      breadcrumbs: true
  - scope:
      path: ""
      type: "words"
    values:
      layout: word
      sidebar:
        nav: "site-nav"
      breadcrumbs: true
  - scope:
      path: ""
      type: "grammar_points"
    values:
      layout: grammar_point
      sidebar:
        nav: "site-nav"
      breadcrumbs: true
  - scope:
      path: ""
      type: "real_conversations"
    values:
      layout: real_conversation
      sidebar:
        nav: "site-nav"
      breadcrumbs: true
  - scope:
      path: ""
      type: "phonology_topics"
    values:
      layout: phonology_topic
      sidebar:
        nav: "site-nav"
      breadcrumbs: true
  - scope:
      path: ""
      type: "pages"
    values:
      layout: page_content
      sidebar:
        nav: "site-nav"
      breadcrumbs: true
  - scope:
      path: ""
      type: "taxonomy_terms"
    values:
      layout: taxonomy_term
      sidebar:
        nav: "site-nav"
      breadcrumbs: true

# Keep our nav_menu for now (used by custom sidebar) — will migrate
# to MM's navigation.yml once layouts stabilize
nav_menu:
  - title: Home
    url: /
  - title: Introduction
    url: /intro/
    children:
      - title: Why learn Kansai-ben?
        url: /intro/#why
      - title: How to learn!
        url: /intro/#how
  - title: Kansai-ben is...?
    url: /what/
    children:
      - title: What is Kansai-ben?
        url: /what/#what
      - title: Where is Kansai?
        url: /what/#where
      - title: Who speaks Kansai-ben?
        url: /what/#who
      - title: When to use Kansai-ben?
        url: /what/#when
  - title: Example conversations
    url: /example-conversations/
  - title: Grammar
    url: /grammar/
    children:
      - title: Grammar point list
        url: /grammar-points/
      - title: Common use list
        url: /common-use-list/
  - title: Vocabulary
    url: /vocabulary/
  - title: Pronunciation
    url: /pronunciation/
    children:
      - title: Accent Patterns
        url: /phonology/353/
      - title: Vowels
        url: /phonology/340/
      - title: Sound Switching
        url: /phonology/349/
  - title: Real conversations
    url: /real-conversations-list/
  - title: Resources
    url: /resources/
  - title: About
    url: /about/
  - title: Feedback
    url: /feedback/

exclude:
  - _mothball/
  - CLAUDE.md
  - Gemfile
  - Gemfile.lock
  - README.md
  - data/
  - schema/
  - tools/
  - vendor/
  - .bundle/
