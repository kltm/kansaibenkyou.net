title: Kansaibenkyou.net
description: >-
  A learning resource for Kansai-ben (関西弁), the family of Japanese
  dialects spoken in the Kansai region. Authored by Keiko Yukawa.
author: Keiko Yukawa
lang: ja
baseurl: ""
url: "https://kansaibenkyou.net"

markdown: kramdown
kramdown:
  input: GFM

# Read canonical YAML data from data/ instead of the Jekyll default
# _data/. This keeps the path matching the LinkML schema authoring
# convention. site.data.<dirname>.<filename> still works as usual.
data_dir: data

# Collection of conversation pages — one stub per chapter under
# _conversations/. The actual conversation content lives in
# data/conversations/ and is referenced from each stub via the
# data_id frontmatter key.
collections:
  conversations:
    output: true
    permalink: /conversations/:name/

# Files and directories not part of the site output. The mothball
# mirror is gitignored, but is also excluded here so a local
# `bundle exec jekyll serve` won't try to copy 300+ MiB of archived
# Drupal pages into _site/. The schema and canonical data live
# alongside the site but are processed by build tools, not by Jekyll.
exclude:
  - _mothball/
  - CLAUDE.md
  - Gemfile
  - Gemfile.lock
  - README.md
  - data/
  - schema/
  - tools/
  - vendor/
  - .bundle/
