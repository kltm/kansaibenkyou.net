title: Kansaibenkyou.net
description: >-
  A learning resource for Kansai-ben (関西弁), the family of Japanese
  dialects spoken in the Kansai region. Authored by Keiko Yukawa.
author: Keiko Yukawa
lang: ja
baseurl: "/kansaibenkyou.net"
url: "https://kltm.github.io"

# GoatCounter analytics (privacy-friendly, no cookies).
# Create an account at https://www.goatcounter.com/ and set your site
# code here. Leave blank to disable analytics.
goatcounter_site: kansaibenkyou

markdown: kramdown
kramdown:
  input: GFM

# Read canonical YAML data from data/ instead of the Jekyll default
# _data/. This keeps the path matching the LinkML schema authoring
# convention. site.data.<dirname>.<filename> still works as usual.
data_dir: data

# Collection of conversation pages — one stub per chapter under
# _conversations/. The actual conversation content lives in
# data/conversations/ and is referenced from each stub via the
# data_id frontmatter key.
collections:
  conversations:
    output: true
    permalink: /conversations/:name/
  words:
    output: true
    permalink: /words/:name/
  grammar_points:
    output: true
    permalink: /grammar_points/:name/
  real_conversations:
    output: true
    permalink: /real_conversations/:name/
  phonology_topics:
    output: true
    permalink: /phonology/:name/
  pages:
    output: true
    permalink: /:name/
  taxonomy_terms:
    output: true
    permalink: /taxonomy/term/:name/

# Files and directories not part of the site output. The mothball
# mirror is gitignored, but is also excluded here so a local
# `bundle exec jekyll serve` won't try to copy 300+ MiB of archived
# Drupal pages into _site/. The schema and canonical data live
# alongside the site but are processed by build tools, not by Jekyll.
nav_menu:
  - title: Home
    url: /
  - title: Introduction
    url: /intro/
    children:
      - title: Why learn Kansai-ben?
        url: /intro/#why
      - title: How to learn!
        url: /intro/#how
  - title: Kansai-ben is...?
    url: /what/
    children:
      - title: What is Kansai-ben?
        url: /what/#what
      - title: Where is Kansai?
        url: /what/#where
      - title: Who speaks Kansai-ben?
        url: /what/#who
      - title: When to use Kansai-ben?
        url: /what/#when
  - title: Example conversations
    url: /example-conversations/
  - title: Grammar
    url: /grammar/
    children:
      - title: Grammar point list
        url: /grammar-points/
      - title: Common use list
        url: /common-use-list/
  - title: Vocabulary
    url: /vocabulary/
  - title: Pronunciation
    url: /pronunciation/
    children:
      - title: Accent Patterns
        url: /phonology/353/
      - title: Vowels
        url: /phonology/340/
      - title: Sound Switching
        url: /phonology/349/
  - title: Real conversations
    url: /real-conversations-list/
  - title: Resources
    url: /resources/
  - title: About
    url: /about/
  - title: Feedback
    url: /feedback/

exclude:
  - _mothball/
  - CLAUDE.md
  - Gemfile
  - Gemfile.lock
  - README.md
  - data/
  - schema/
  - tools/
  - vendor/
  - .bundle/
