<link rel="icon" href="{{ '/assets/images/takkun.ico' | relative_url }}" type="image/x-icon">
<meta name="baseurl" content="{{ site.baseurl }}">
<link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}">
<script>
// Banner-image rotation applies ONLY to the homepage hero overlay.
// The old site did not carry a photo banner on interior pages — only
// a thin title bar. Two independent visual audits flagged the
// inner-page banner strip as the biggest "louder" regression.
document.addEventListener("DOMContentLoaded", function() {
  var hero = document.querySelector(".page__hero--overlay");
  if (!hero) return;
  var base = (document.querySelector('meta[name="baseurl"]') || {}).content || "";
  fetch(base + "/assets/banner/manifest.json")
    .then(function(r) { return r.json(); })
    .then(function(images) {
      if (!images.length) return;
      var pick = images[Math.floor(Math.random() * images.length)];
      var url = base + "/assets/banner/" + pick;
      hero.style.backgroundImage = "linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url(" + url + ")";
    });
});
</script>
