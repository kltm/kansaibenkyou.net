<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <h1 class="site-title">
        <a href="{{ '/' | relative_url }}">{{ site.title }}</a>
      </h1>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/intro/' | relative_url }}">Intro</a>
        <a href="{{ '/what/' | relative_url }}">What is Kansai-ben?</a>
        <a href="{{ '/conversations/' | relative_url }}">Conversations</a>
        <a href="{{ '/grammar/' | relative_url }}">Grammar</a>
        <a href="{{ '/pronunciation/' | relative_url }}">Pronunciation</a>
        <a href="{{ '/real-conversations/' | relative_url }}">Real conversations</a>
        <a href="{{ '/resources/' | relative_url }}">Resources</a>
        <a href="{{ '/about/' | relative_url }}">About</a>
      </nav>
    </div>
    <div class="banner-container">
      <img id="banner-image" src="" alt="" class="banner-image">
    </div>
  </header>
  <script src="{{ '/assets/js/banner-carousel.js' | relative_url }}"></script>

  <main class="site-main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>
      Site content © Keiko Yukawa, licensed under
      <a href="https://creativecommons.org/licenses/by-sa/3.0/">CC BY-SA 3.0</a>.
      Site code © kltm, licensed under BSD 3-Clause.
    </p>
  </footer>

  {%- if site.goatcounter_site %}
    <script data-goatcounter="https://{{ site.goatcounter_site }}.goatcounter.com/count"
            async src="//gc.zgo.at/count.js"></script>
  {%- endif %}
</body>
</html>
