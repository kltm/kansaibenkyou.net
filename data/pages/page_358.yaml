title: Grammar
slug: grammar
body: '<p><img class="left-image" src="/assets/images/wiki-kasuga-taisha_160.jpg"/></p><p>When comparing
  Kansai-ben and standard Japanese, in addition to the different intonations and vocabulary, the grammar
  can also be quite different. Without knowledge of the grammar, you may not be able to understand the
  meaning of a sentence even though the individual words are understood. On the other hand, even if some
  of the words don''t make sense, you may be able to guess the broad meaning of the sentence if you can
  understand the grammar.</p><p>This section contains direct access to the grammar points on this site,
  covering the Kansai-ben grammar that''s frequently used in everyday conversation. In addition, you will
  find links back to grammar pages from many different places on the site, such as the <a href="/example-conversations/">conversation
  examples</a> and <a href="/vocabulary/">vocabulary pages</a>.</p><dt><a href="/grammar-points/">Grammar
  point list</a></dt><dd>A complete list of the grammar points covered and links to their individual pages.
  Every grammar point page contains an explanation, a comparison with standard Japanese, formation rules
  (i.e., how to create the form from words and conjugations), and example sentences, as well as occasional
  commentary. Additional components, grammar element and common use tags, are there help you search for
  related grammar by grammatical structure (e.g., Vてもええ) or purpose.</dd><dt><a href="/common-use-list/">Common
  use list</a></dt><dd>A complete list of tagged uses for grammar (as mentioned above), which link to
  the pages that have those tags. These tags enable the user to search out grammar that has a particular
  common functional use or purpose (e.g., permission, gratitude, making a potential form<sup class="lexicon-indicator"
  title="For example: 食べられる, 行ける, できる, and 来られる."><a class="lexicon-term" href="/taxonomy/term/175/" title="For
  example: 食べられる, 行ける, できる, and 来られる.">?</a></sup>) in various places on the site.</dd>'
