title: Kansai related resources
slug: resources
body: '<p>The materials listed below may be useful for getting a more broad taste of the culture and language
  of Kansai. While Kansaibenkyou.net does not endorse these materials and has not fully reviewed their
  contents, we wanted to include links to additional resources and media types that are not represented
  on Kansaibenkyou.net but might be of interest.</p><h3>Kansai-ben textbooks (English)</h3><dl><dt>Kansai
  Japanese - The Language of Osaka, Kyoto, and Western Japan</dt><dd>by Peter Tse, 1993, [<a href="http://en.wikipedia.org/w/index.php?title=Special%3ABookSources&amp;isbn=9780804818681">ISBN9780804818681</a>]</dd><dt>Colloquial
  Kansai Japanese - The Dialects and Culture of the Kansai Region</dt><dd>by D. C. Palter / Kaoru Slotsve,
  1995, [<a href="http://en.wikipedia.org/w/index.php?title=Special%3ABookSources&amp;isbn=9780804837231">ISBN9780804837231</a>]</dd></dl><h3>Kansai-ben
  textbooks (Japanese)</h3><dl><dt>聞いておぼえる関西(大阪)弁入門 ("Kiite oboeru kansai Ōsaka ben nyūmon")</dt><dd>by
  Makiko Okamoto. et al, 2006, [<a href="http://en.wikipedia.org/w/index.php?title=Special%3ABookSources&amp;isbn=9784894762961">ISBN9784894762961</a>]</dd></dl><h2>Kansai-ben
  website (English)</h2><dl><dt><a href="http://www.nihongoresources.com/language/dialects/kansaiben.html">The
  Kansai and Osaka dialects-nihongoresources.com</a></dt><dd>This is one of the few sites that explains
  Kansai-ben in English. Although most of the information on this site is covered by <a href="/">Kansibenkyou.net</a>,
  you might find new words in the word list.</dd><dt><a href="http://www.kansaiben.com/">Kansai Ben: Kansai
  Dialect Self-study Site</a></dt><dd>This is a self study site for Japanese language learners created
  by MIT Japanese teachers. I especially recommend Chapter 5 and 6, where you can listen to actual Kansai-ben.</dd><dt><a
  href="http://www.eastudies.org/guide_kansaiben.html">Kansai Japanese Guide</a></dt><dd>This site provides
  Kansai-ben texts and videos made by Ritsumeikan University students. Although how people talk in these
  videos is sometimes unnatural, you may find the provided subtitles useful.</dd></dl><h3>Kansai-ben website
  (Japanese)</h3><dl><dt><a href="https://mmsrv.ninjal.ac.jp/hogendanwa_db/list04/index.html" class="kb-linkrot" data-kb-note="link updated, 2026">日本のふるさとことば集成～近畿～
  ("The database of speaking of Japanese dialects, Kinki") - NIJLA</a></dt><dd>This site contains real
  conversations by Kansai natives (click on サンプル and then click on 再生 to play). Although the information
  is all in Japanese, you can view a transcript of the conversation and get information about the speakers''
  backgrounds. These conversations are very natural and real--I highly recommend them.</dd><dt><a href="https://web.archive.org/web/20240913102849/http://hirokun.o.oo7.jp/kouza00.html" class="kb-linkrot" data-kb-note="archive.org copy, 2024">関西弁基礎講座
  ("The basic lecture of Kansai-ben")</a></dt><dd>This site introduces characteristic Kansai-ben grammar
  points and onomatopoeia. Although the explanations are all in Japanese, you should be able to roughly
  understand them.</dd></dl><dt><a href="http://www.akenotsuki.com/kyookotoba/">京言葉 ("Kyo-kotoba")</a></dt><dd>This
  site is about Kyokotoba--a dialect spoken in Kyoto. The information is mainly about grammar and accent
  patterns.</dd><dt><a href="https://web.archive.org/web/20150624154936/http://www.osakaben.jp/" class="kb-linkrot" data-kb-note="archive.org copy, 2015">全国大阪弁普及協会 ("The national Association for the Promotion
  of the Osaka Dialect")</a></dt><dd>This site contains a lot of information on Osaka-ben.</dd><dt><a
  href="https://web.archive.org/web/20160526220105/http://www.geocities.jp/immanuel_wa/hoby/osakaben/osakaben.htm" class="kb-linkrot" data-kb-note="archive.org copy, 2016">わたさんの大阪弁アクセント講座 ("The accent lecture
  of Osaka-ben by Wata-san")</a></dt><dd>This site, by an Osaka native, is about accent patterns in Osaka-ben.
  While the explanations are detailed, they are written in Japanese and might be difficult to understand
  for intermediate learners.</dd><h3>General information on Kansai</h3><dl><dt><a href="https://web.archive.org/web/20120112174518/http://www.kansai.gr.jp/" class="kb-linkrot" data-kb-note="archive.org copy, 2012">Kansai
  Window</a></dt><dd>This site is a Kansai portal and operated by <a href="https://web.archive.org/web/20110903063117/http://www.kansai.gr.jp/ku/index.html" class="kb-linkrot" data-kb-note="archive.org copy, 2011">Kansai
  Unity</a>. Although their definition of Kansai is larger than the general definition, this website is
  quite useful for getting general information.</dd><dt><a href="https://web.archive.org/web/20160601135516/http://www.kansai-japan.net/en/" class="kb-linkrot" data-kb-note="archive.org copy, 2016">Welcome!
  KANSAI</a></dt><dd>This site is also operated by <a href="https://web.archive.org/web/20110903063117/http://www.kansai.gr.jp/ku/index.html" class="kb-linkrot" data-kb-note="archive.org copy, 2011">Kansai
  Unity</a>, and provides information on Kansai for visitors. Like <a href="https://web.archive.org/web/20120112174518/http://www.kansai.gr.jp/" class="kb-linkrot" data-kb-note="archive.org copy, 2012">Kansai
  Window</a>, their definition of Kansai is larger than the general definition.</dd><dt><a href="https://web.archive.org/web/20120301171845/http://www.japaneselifestyle.com.au/travel/kansai.htm" class="kb-linkrot" data-kb-note="archive.org copy, 2012">JAPANESE
  LIFESTYLE -KANSAI-</a></dt><dd>While this site is a general guide to Japan, there is a lot of information
  on Kansai, such as geography and culture.</dd><dt><a href="http://www.visitkansai.com">VisitKansai travel
  guide</a></dt><dd>This site is for Kansai visitors. While the information they provide is minimal, you
  can use the site to request volunteer guides for when you visit Kansai.</dd><dt><a href="https://web.archive.org/web/20120301171845/http://www.japaneselifestyle.com.au/travel/kansai.htm" class="kb-linkrot" data-kb-note="archive.org copy, 2012">Japanese
  Lifestyle</a></dt><dd>This site has a lot of information on Kansai, such as geography and culture. It
  may be useful for visitors.</dd></dl>'
