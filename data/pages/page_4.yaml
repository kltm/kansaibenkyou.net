title: Welcome to Kansaibenkyou.net!
slug: home
body: <p><img class="left-image" src="/assets/images/wiki-takoyaki_160.jpg"/></p><p>This website has been
  made to ease your frustration with Kansai-ben--the dialect of Japanese spoken in Kansai, the south-central
  region of Japan's main island Honshu.</p><p><img class="right-image" src="/assets/images/wiki-dotonbori-02_160.jpg"/></p><p>Whether
  you are living in, working in, visiting, or just thinking about Kansai, Kansaibenkyou.net is a site
  for Japanese learners and teachers who want to learn about the Japanese dialect spoken in the Kansai
  region of Japan. Here you will find materials on <a href="/pronunciation/">pronunciation</a>, <a href="/grammar/">grammar</a>,
  <a href="/vocabulary/">vocabulary</a>, expressions, <a href="/example-conversations/">example conversations</a>,
  audio examples, and <a href="/real-conversations/">real conversations</a> by Kansai natives. While some
  things may be a little hard to understand in the beginning, hopefully you will come to feel and understand
  Kansai-ben as the language of daily life in a major part of Japan.</p><p><img class="left-image" src="/assets/images/wiki-kinkakuji_160.jpg"/></p><p>While
  there are materials here for different levels of students and educators, an emphasis is placed on students
  of Japanese who are going to live or work in Kansai. This site assumes that the user has at least a
  fairly functional knowledge of standard Japanese (hyoujungo)--specifically for those who are at least
  intermediate (about two years of college-level study).</p><p>With all of that, the best place to probably
  start is the <a href="/intro/">introduction</a> page--we hope you have fun Kansai-benkyouing!</p><div
  class="clearfix"></div>
