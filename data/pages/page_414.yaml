title: Introduction
slug: intro
body: <p><img class="left-image" src="/assets/images/wiki-dotonbori-01_160.jpg"/></p><h3 id="why">Why
  learn Kansai-ben?</h3><p>In Japan, like many places in the world, even though there is one common language,
  people may speak very differently depending on where they live; sometimes different enough that even
  native speakers may have trouble understanding each other. In fact, the "standard" Japanese that is
  usually taught to learners of Japanese is not really used anywhere, and is rarely heard except from
  news announcers. Many students of Japanese have lost their confidence in their ability because, even
  though they studied Japanese for years, they could not understand actual conversations where a heavy
  dialect is spoken. Of course, almost all Japanese can converse and understand a "standard" Japanese
  dialect, but not being able to fluidly participate in the world around you can be frustrating and limiting.</p><h3
  id="how">How to learn using this site...</h3><p>The materials on this site are interlinked, allowing
  you to move from one point to another as your needs require and your curiosity takes you. Hopefully
  the materials and their presentation are self-explanatory, but here is the broad overview of what you'll
  find.</p><dt><a href="/what/">Kansai-ben is...?</a><br/><dt></dt></dt><dd>We suggest that you start
  with this page to learn about the "what", "where", "who", and "when" of Kansai-ben. Among other things,
  it will touch on the <a href="/what/#what">definition</a> of Kansai-ben, Kansai <a href="/what/#where">geography</a>,
  the dialect's <a href="/what/#who">relationship with standard Japanese</a>, and when it's <a href="/what/#when">appropriate
  to use</a> Kansai-ben.</dd><dt><a href="/example-conversations/">Example conversations</a></dt><dd>The
  next step is to try some example conversations--realistic fictional conversations created to illustrate
  certain aspects of Kansai-ben grammar, vocabulary, and usage. Each example conversation includes an
  audio track in Kansai-ben and the text in Kansai-ben, standard Japanese, and English. These pages also
  provide a good jumping off point for using this site as the conversations are fully linked to useful
  information about <a href="/grammar/">grammar</a> and <a href="/vocabulary/">vocabulary</a>. We also
  have a short video explanation:</dd><dd><iframe allowfullscreen="" frameborder="0" height="349" src="http://www.youtube.com/embed/fV4mP94iQAQ?hl=en&amp;fs=1"
  width="425"></iframe></dd><dt><a href="/grammar/">Grammar</a><br/><dt></dt></dt><dd>In this area, we
  provide explanations for basic Kansai-ben grammar. For easy access to the wide range of grammar, you
  will find a list of the <a href="/grammar-points/">grammar points</a> and the <a href="/common-use-list/">common
  uses</a> of the grammar. In addition, you will find backlinks to the grammar point pages everywhere
  that deals with grammar.</dd><dt><a href="/vocabulary/">Vocabulary</a></dt><dd>When you want to look
  up Kansai-ben words, go to the vocabulary page, and find the words on the list (the search box works
  as well if you know what you're looking for). The words are listed in Japanese alphabetical order and
  have usage icons when there is a special meaning or purpose. You can go to individual vocabulary pages
  from the <a href="/example-conversations/">example conversations</a> and various other places.</dd><dt><a
  href="/pronunciation/">Pronunciation</a></dt><dd>The sound of Kansai-ben is very different from the
  sound of standard Japanese, and no matter how well the words and grammar of Kansai-ben are used, it
  will still sound a little odd if the pronunciation if off. In the area we provide explanations for three
  major phonology topics and a lot of audio examples.</dd><dt><a href="/real-conversations/">Real conversations</a></dt><dd>Real
  conversations are natural candid conversations by natives of the Kansai area. Hopefully, if you have
  gone through the material on this site, you should be able to follow along with the conversations and
  understand them. Real conversations are great for training your ear and getting used to actual Kansai-ben.</dd><dt><a
  href="/resources/">Kansai related resources</a></dt><dd>For users interested in going deeper into the
  study of the Kansai dialect, we provide useful links for getting a more broad taste of the culture and
  language.</dd>
