title: About
slug: about
body: '<h3 id="about-purpose">Purpose</h3><p>The purpose of this site is to prepare learners to interact
  with Japanese as it is actually spoken on the ground, something that is typically skipped or glossed
  over in most college and university courses. Because Kansai is the area where the most common non-standard
  dialect (Kansai-ben) is spoken, and a significant part of Japanese media includes this dialect, this
  site has been created to help learners and teachers understand Kansai-ben.</p><p>The fact is that Japanese
  language learners study standard Japanese almost exclusively, but in Japan, when visiting, working,
  or coming into contact with media, they will likely have experiences with non-standard--though common--Japanese.
  Moreover, the dynamic between standard Japanese and various dialects is an important part of how Japanese
  relate to their own language. Unfortunately, most teaching materials are in standard Japanese, and many
  teachers may lack the ability or experience to effectively teach about dialects. Moreover, dialects
  can be used as a window into Japanese culture.</p><h3 id="about-acknowledgments">Acknowledgments</h3><p>I
  would like to thank Professor Masahiko Minami and Assistant Professor Tomoko Takeda for their invaluable
  assistance, support, and guidance during this project and during my time at San Francisco State University.</p><p>And
  my thanks to Professor Midori McKeon and Associate Professor Makiko Asano for teaching me about Japanese
  and helping me to get to the point of this project.</p><p>I would also like to give a more broad thanks
  to the Japanese Department at San Francisco State University for this opportunity.</p><p>My thanks also
  to the people who kindly let me record them, and without which this project would not have been fully
  realized: Nobuhiko Izumi, Fumi Izumi, Masayoshi Kojima, Maeda Wood Miki, Hisayo Ono, Haruka Shinkura,
  Ryo Takada, Yuko Yamano, Masayoshi Yasuda, Atsushi Yukawa and others.</p><p>I would like to thank the
  people who helped translate and edit this site during its creation: Nicholas March, </p><p>Finally,
  my deepest thanks to my husband Seth Carbon for his technical knowledge, editorial, advice, support,
  and encouragement in things small and large.</p><h3 id="about-authorship">Authorship and Usage</h3><p>
  This site was initially created as a Master of Arts project by Keiko Yukawa at San Francisco State University,
  and is currently maintained by her.</p><p>Unless otherwise noted on the <a href="/copyright/">copyright</a>
  page, this <span href="http://purl.org/dc/dcmitype/StillImage" rel="dct:type" xmlns:dct="http://purl.org/dc/terms/">site
  and its contents</span> are licensed under a <a href="http://creativecommons.org/licenses/by-sa/3.0/"
  rel="license">Creative Commons Attribution-ShareAlike 3.0 Unported License</a> by <a href="/" property="cc:attributionName"
  rel="cc:attributionURL" xmlns:cc="http://creativecommons.org/ns#">Keiko Yukawa</a>.</p><h3 id="about-contact">Contact</h3><p>For
  any inquiries, please contact "keiko" at this domain (kansaibenkyou.net).</p><h3 id="about-contact">Other</h3><p>For
  information about the <b><a href="/copyright/">copyright</a></b> of the media used on this site, the
  <b><a href="/development/">development</a></b> of this site, or the <b><a href="/bibliography/">bibliographic</a></b>
  information for the materials used to create this site, please see their respective pages under the
  <b>About</b> navigation item in the side menu.</p>'
