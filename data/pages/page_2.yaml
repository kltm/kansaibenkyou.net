title: About
slug: about
body: 'Purpose

  The purpose of this site is to prepare learners to interact with Japanese as it is actually spoken on
  the ground, something that is typically skipped or glossed over in most college and university courses.
  Because Kansai is the area where the most common non-standard dialect (Kansai-ben) is spoken, and a
  significant part of Japanese media includes this dialect, this site has been created to help learners
  and teachers understand Kansai-ben.

  The fact is that Japanese language learners study standard Japanese almost exclusively, but in Japan,
  when visiting, working, or coming into contact with media, they will likely have experiences with non-standard--though
  common--Japanese.  Moreover, the dynamic between standard Japanese and various dialects is an important
  part of how Japanese relate to their own language. Unfortunately, most teaching materials are in standard
  Japanese, and many teachers may lack the ability or experience to effectively teach about dialects.
  Moreover, dialects can be used as a window into Japanese culture.

  Acknowledgments

  I would like to thank Professor Masahiko Minami and Assistant Professor Tomoko Takeda for their invaluable
