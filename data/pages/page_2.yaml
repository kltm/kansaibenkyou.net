  Haruka Shinkura, Ryo Takada, Yuko Yamano, Masayoshi Yasuda, Atsushi Yukawa and others.

  I would like to thank the people who helped translate and edit this site during its creation: Nicholas
  March,

  Finally, my deepest thanks to my husband Seth Carbon for his technical knowledge, editorial, advice,
  support, and encouragement in things small and large.

