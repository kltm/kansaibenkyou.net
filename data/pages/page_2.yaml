  And my thanks to Professor Midori McKeon and Associate Professor Makiko Asano for teaching me about
  Japanese and helping me to get to the point of this project.

  I would also like to give a more broad thanks to the Japanese Department at San Francisco State University
  for this opportunity.

  My thanks also to the people who kindly let me record them, and without which this project would not
