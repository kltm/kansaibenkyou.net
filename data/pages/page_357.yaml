title: Example conversations
slug: example-conversations
body: <p><img class="left-image" src="/assets/images/kb-dinner_160.jpg"/></p><p>Even with a familiarity
  of the vocabulary and grammar of Kansai, it may be hard to understand conversations between speakers
  of the dialect. To help build towards this goal, we have created twelve conversations based on real
  conversations--each conversation includes an audio track in Kansai-ben and the text in Kansai-ben, standard
  Japanese (in translation), and English (in translation). In addition, the grammar and vocabulary from
  the conversations are explained in detail from the linked pages on individual lines. Use the buttons
  to toggle between all of these.</p><p>The topics of these conversations were chosen to be situations
  that you could realistically encounter when starting to live or work in Kansai. Since dialect usage
  is not as common in formal settings like company meetings, most conversations are set in more casual
  environments. Since the exact dialect spoken can depend on things like the speaker's age, gender, and
  relationship to each other, the characters in these conversations come from a variety of backgrounds.
  When you listen to and read the conversations, please note these differences. Below is the current list
  of example conversations.</p><p>After you have gone over some of the features of Kansai-ben from the
  example conversations, you will be ready to tackle actual Kansai-ben conversations spoken by natives
  in context. These can be found in the <a href="/real-conversations/">real conversations</a> section.</p><table
  class="full-grid-table"><tr><th>Topic</th><th>Description</th><th>Characters</th></tr><tr><td><a href="/node/264">大家さんと<br
  />(With a Landlord)</a></td><td>Atsushi leaves his apartment for work in the morning and meets his landlord
  cleaning out front.</td><td>Atsushi (25)<br />The Landlord (65)</td></tr><tr><td><a href="/node/265">歓迎会で<br
  />(At a Welcome Party)</a></td><td>The new man at the company, Mori, is at his welcome party. He is
  chatting with his boss and new coworker, Kimura.</td><td>Mori (25)<br />The Boss (48)<br />Kimura (35)</td></tr><tr><td><a
  href="/node/266">街で<br />(In the City)</a></td><td>Junko runs into a coworker, Noriko, while on her
  way to a belly dance lesson...</td><td>Junko (26)<br />Noriko (27)</td></tr><tr><td><a href="/node/267">魚屋で<br
  />(At a Seafood Stall)</a></td><td>Hanako is doing a little shopping at a seafood stall.</td><td>Hanako
  (45)<br /><span class="nowrap">The Fishmonger (50)</span></td></tr><tr><td><a href="/node/268">道を聞く<br
  />(Asking Directions)</a></td><td>Atsushi asks directions on the street for the Takashimaya department
  store in Namba.</td><td>Atsushi (25)<br />The Passerby (65)</td></tr><tr><td><a href="/node/269">カラオケで
  <br />(At Karaoke)</a></td><td>Mori, and his coworkers Kimura and Sakagami, go to karaoke on the way
  home from work...</td><td>Mori (25)<br />Kimura (35)<br />Sakagami (35)</td></tr><tr><td><a href="/node/270">電車で<br
  />(On a Train)</a></td><td>Atsushi is on a train and gives up his seat to an old man...</td><td>Atsushi
  (25)<br />The Old Man (70)</td></tr><tr><td><a href="/node/271"><span class="nowrap">同じアパートの住人と</span><br
  />(With a Neighbor)</a></td><td>A neighbor complains to Atsushi.</td><td>Atsushi (25)<br />The Neighbor
  (60)</td></tr><tr><td><a href="/node/272">会社で<br />(At a Company)</a></td><td>Mori has a presentation,
  but isn't feeling well. His coworker notices that he's pushing himself too hard and probably shouldn't
  be at work...</td><td>Mori (25)<br />Kishimoto (37)<br />Sugimoto (32)<br />Oshima (35)</td></tr><tr><td><a
  href="/node/273">会社の昼休み<br />(During Lunch)</a></td><td>Junko is chatting with her coworkers, Noriko
  and Natsuko, during lunch.</td><td>Junko (26)<br />Noriko (27)<br />Natsuko (35)</td></tr><tr><td><a
  href="/node/274">居酒屋で<br />(At an Izakaya)</a></td><td>Junko and Noriko are drinking and chatting at
  an izakaya after work.</td><td>Junko (26)<br />Noriko (27)</td></tr><tr><td><a href="/node/275">お好み焼屋で<br
  />(At an Okonomiyaki Restaurant)</a></td><td>Atsushi brings his friend to his usual okonomiyaki restaurant.</td><td>Atsushi
  (25)<br />The Friend (26)<br />The Owner (46)</td></tr></table><p>
