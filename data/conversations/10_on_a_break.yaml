  standard: ああ、こないだ、入って来た子いるじゃない。あの子けっこういいんじゃない？
  english: Oh, how about that new boy? I think he's pretty good looking.
  kansai_grammar: ああ、こないだ、入って来た子おる(311やん)。あの子けっこうええ(311やん)。
  kansai_word: ああ、こないだ、入って来た子(149おる)やん。あの子けっこう(45ええ)やん。
- speaker: のり子
  kansai: 森くんですか？　あんまタイプとちゃうねんなあ。
  standard: 森くんですか？　あんまりタイプじゃないんだよねえ。
  english: Are you talking about Mori? Not really my type.
