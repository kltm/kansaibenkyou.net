  kansai_grammar: ほな、あんたどんなんがええ(309ん)？
  kansai_word: ほな、あんたどんなんが(45ええ)ん？
- speaker: のり子
  kansai: ジョニーデップみたいな人がええねんけどな。
  standard: ジョニーデップみたいな人がいいんだけどな。
  english: I'd like someone like Johnny Depp.
