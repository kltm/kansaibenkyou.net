  kansai_grammar: まあ、そらそやなあ。ほやけど、むこうもそない(331あやまってん)(330やったら)、いっぺん、会うだけ(321会うてみぃ)(306や)。
  kansai_word: まあ、(205そら)(161そや)なあ。(166ほやけど)、むこうも(173そない)あやまってんやったら、(145いっぺん)、会うだけ会うてみぃや。
- speaker: じゅん子
  kansai: う〜ん、考えてみるわ。
  standard: う〜ん、考えてみるよ。
