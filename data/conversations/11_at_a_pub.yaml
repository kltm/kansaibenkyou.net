  kansai_word: え、うそやん。(289こないだ)会うたとき二人とも(160めっちゃ)仲良かったやん。
- speaker: じゅん子
  kansai: あん時はな、まだよかってんけど、うち最近、仕事めっちゃ忙しかったやろ。ほんで、あんまさとしと会われへんかってんな。ほんなら、あいつ、うわきしよってん。うちがいっしょうけんめい働いてるっちゅうのに、あっちはほかの女んとこ行とってんで。ひどない？
  standard: あの時はね、まだよかったんだけど、私、最近、仕事すごく忙しかったでしょ。それで、あんまりさとしと会えなかったんだ。そしたら、あいつ、うわきしたの。私がいっしょうけんめい働いてるというのに、あっちはほかの女のところに行ってたんだよ。ひどくない？
  english: We were still okay then, but after I got so busy we couldn't see each other much. That's when
    he cheated on me. While I was working hard, he off at another girl's place. Isn't that awful?
  kansai_grammar: あん時は(305な)、まだよかっ(309てん)けど、うち最近、仕事めっちゃ忙しかった(330やろ)。(316ほんで)、あんまさとしと(296会われへん)かっ(309てん)(305な)。ほんなら、あいつ、(338うわきしよってん)。うちがいっしょうけんめい(331働いてる)(302っちゅう)のに、あっちはほかの女んとこ(331行とってん)(307で)。ひどない？
  kansai_word: あん時はな、まだよかってんけど、うち最近、仕事(160めっちゃ)忙しかったやろ。(169ほんで)、(143あんま)さとしと会われへんかってんな。(171ほんなら)、あいつ、うわきしよってん。(155うち)がいっしょうけんめい働いてるっちゅうのに、あっちはほかの女んとこ行とってんで。ひどない？
- speaker: のり子
  kansai: めちゃくちゃやなあ。
  standard: めちゃくちゃだねえ。
  english: It's terrible.
- speaker: じゅん子
  kansai: 時々、メール来んねんけどな、むかつくからいっこも返事してへんねん。
  standard: 時々、メール来るんだけどね、むかつくから全然返事していないんだ。
  english: I sometimes get messages from him, but I'm still pretty angry don't even acknowledge them.
  kansai_grammar: 時々、メール来ん(309ねん)けど(305な)、むかつくから(299いっこも)(296返事してへん)(309ねん)。
- speaker: のり子
  kansai: えー、むこうはまだ気ぃあるんちゃうん？どんなメール来んの？
  standard: えー、むこうはまだ気があるんじゃないの？どんなメールが来るの？
  english: Really? He might still have feelings for you. What kind of messages?
  kansai_grammar: えー、むこうはまだ気ぃあるんちゃう(309ん)？どんなメール来んの？
  kansai_word: えー、むこうはまだ(283気ぃある)ん(178ちゃう)ん？どんなメール来んの？
- speaker: じゅん子
  kansai: 「もうあいつと別れたからもっかい会うてくれへん？」とか「ごめん、かんにんして。まだおこってんか？」とか。もう、ほんまむかつくで。
  standard: 「もうあいつと別れたからもう一回会ってくれない？」とか「ごめん、ゆるして。まだおこってる？」とか。もう、本当にむかつくよ。
  english: 'I got ones like: "I''m not seeing that girl anymore, could we meet just one more time?" and
    "I''m so sorry, please forgive me. Are you still mad?". It really gets me cranked up.'
  kansai_grammar: 「もうあいつと別れたからもっかい(318会うてくれへん)？」とか「ごめん、かんにんして。まだ(309おこってん)(308か)？」とか。もう、ほんまむかつく(307で)。
  kansai_word: 「もうあいつと別れたから(196もっかい)会うてくれへん？」とか「ごめん、(199かんにんして)。まだおこってんか？」とか。もう、(41ほんま)むかつくで。
- speaker: のり子
  kansai: ほやけど、あんた、ほんまに別れてええん？あんたもまだ気ぃあるんちゃうん？
  standard: そうだけど、じゅん子、本当に別れてもいいの？じゅん子もまだ気があるんじゃない？
  english: But are you really sure that you want to break up with him? I think that you're still interested
