  kansai_word: (288あんな)、実はな、さとしと別れよ思てんねん。
- speaker: のり子
  kansai: え、うそやん。こないだ会うたとき二人ともめっちゃ仲良かったやん。
  standard: え、うそ。このあいだ会ったとき二人ともすごく仲良かったじゃない。
  english: You're kidding! The last time we met, you looked so happy together.
