  kansai: そら、ちょっとはな。ほやけど、いっぺんうわきされたらもう信じられへんわ。
  standard: それは、ちょっとはね。だけど、一回うわきされたらもう信じられないよ。
  english: Yeah, a little bit. But he cheated on me and I just can't trust him anymore.
  kansai_grammar: そら、ちょっとは(305な)。ほやけど、いっぺんうわきされたらもう(296信じられへん)(304わ)。
  kansai_word: (205そら)、ちょっとはな。(166ほやけど)、(145いっぺん)うわきされたらもう信じられへんわ。
- speaker: のり子
  kansai: まあ、そらそやなあ。ほやけど、むこうもそないあやまってんやったら、いっぺん、会うだけ会うてみぃや。
  standard: まあ、それはそうだね。だけど、むこうもそんなにあやまっているんだったら、一回、会うだけ会ってみたら？
  english: That's true. But if he's apologizing that much you might want to consider seeing him one more
