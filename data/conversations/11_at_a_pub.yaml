- speaker: のり子
  kansai: あ〜、もう毎日残業ばっかりでやってられへんわ。
  standard: あ〜、もう毎日残業ばかりでやってられないよ。
  english: Ugh...I can't do overtime every day.
  kansai_grammar: あ〜、もう毎日残業ばっかりで(296やってられへん)(304わ)。
- speaker: じゅん子
  kansai: ほんまやで。給料安いのに、なんでこない毎日遅うまで働かなあかんのやろ。仕事ばっかりで、どっこも行かれへん。いっこもおもんないわ。
  standard: 本当に。給料安いのに、なぜこんなに毎日遅くまで働かなきゃいけないんだろう。仕事ばかりで、どこにも行けない。全然おもしろくないよ。
  english: I know. I don't understand why we have to work so long for so little. I can never go anywhere
    because I have work. It gets so boring.
