title: せやさかい
title_romaji: seyasakai
body: <p>so; because of (that); therefore</p>
commentary: <p>Also see <a href="/words/363/">そやさかい</a> and the grammar point for <a href="/grammar-points/315/">さかい</a>.</p>
example: '<p>A: あ〜、眠いわあ。<br/> B: <strong>せやさかい</strong>、昨日早よ寝えって言うたやん。</p><p>A: Ahhh...I''m tired.<br/>
  B: Because of that, I told you yesterday that you should go to bed early.</p>'
standard_kana: そうだから
