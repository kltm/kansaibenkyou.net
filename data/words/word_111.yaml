id: word_111
drupal_node_id: 111
title: えんりょのかたまり
body: that one last piece of food at the table that everyone refuses to eat because they don't want to
  be the rude one.
commentary: '"えんりょ" means to reserve.

  "かたまり" means lump.

  The literary means of "えんりょのかたまり" is a lump of reserve.'
standard_kana: のこりもの(たべもの)
standard_kanji: 残り物(食べ物)
word_types:
- wordtype_7
title_romaji: enryonokatamari
