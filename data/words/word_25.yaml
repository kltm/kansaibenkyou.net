title: ぶたまん
title_romaji: butaman
body: <p>pork bun</p>
commentary: <p>This variation is due to the fact that in eastern Japan <em>niku</em> tends to mean pork
  while in Kansai it means beef, thus a pork-filled bun needs a separate word.</p>
kanji: 豚まん
standard_kana: にくまん
standard_kanji: 肉まん
