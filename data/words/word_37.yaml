id: word_37
drupal_node_id: 37
title: えらい
body: great; very/really; tired
commentary: 'Like the standard Japanese usage, えらい means "great" in Kansai-ben. However, in Kansai-ben,
  えらい also has meanings such as "very" and "tired".

  Also see しんどい.'
standard_kana: すぐれている; とても; つかれている
standard_kanji: 優れている; とても; 疲れている
