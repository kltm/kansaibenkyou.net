id: word_291
drupal_node_id: 291
title: ほやかて
title_romaji: hoyakate
body: <p>So you say, but... / Yeah, but...</p>
commentary: <p><a href="/words/292/">そやかて</a> and <a href="/words/290/">せやかて</a> are almost identical,
  with the personal preference deciding which is chosen.</p><p>For more information about the base grammar,
  please see <a href="/grammar-points/314/">かて</a>.</p>
example: '<p>A: あんた、またカバン買うたんか。<br/> B: <strong>ほやかて</strong>安かってんもん。</p><p>A: You really bought another
  bag?<br/> B: Yeah--it was so cheap.</p>'
standard_kana: そうはいっても／そうだけど
standard_kanji: そうは言っても／そうだけど
word_types:
- wordtype_15
