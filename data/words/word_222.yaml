title: ちょけ
title_romaji: choke
body: <p>person who jokes around all the time</p>
commentary: <p>This comes from the verb <a href="/words/221/">ちょける</a>.</p><p>Some people may say <a href="/words/364/">おちょけ</a>
  instead.</p>
example: <p>さとしは<strong>ちょけ</strong>やけど、サッカーする時だけはまじめやな。<br/> Satoshi is a real clown; the only time he's
  serious is when he's playing soccer.</p>
standard_kana: ふざけたことをする(いう)ひと
standard_kanji: ふざけたことをする(言う)人
