title: ねちこい
title_romaji: nechikoi
body: <p>persistent; stubborn; sticky</p>
commentary: <p>When you want to emphasize more, use <a href="/words/62/">ねちっこい</a>.</p>
example: <p>あの人、<strong>ねちこい</strong>性格やなあ。まだあの事言うてんのか。<br/> She just doesn't stop--is she still talking
  about that?</p>
