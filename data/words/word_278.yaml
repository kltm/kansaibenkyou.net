title: さよか
title_romaji: sayoka
body: <p>I see... / Is that the way it is...?</p>
commentary: <p>This word may sound distant or cold depending on how it is said.</p>
example: <p><strong>さよか</strong>、やっぱりあいつのせいやってんな。<br/> I see. I thought it was his fault.</p>
standard_kana: そうですか
