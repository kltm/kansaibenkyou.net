title: おっちゃん
body: uncle; middle-aged man
commentary: 'This phrase is often used when calling for somebody or getting their attention. It should
  usually be used only with people you have a little history with. It can also be used with family members.

  The female counterpart of おっちゃん is おばちゃん.

  Also see おっさん.'
standard_kana: おじさん
standard_kanji: 叔父さん
