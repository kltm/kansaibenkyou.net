title: おっちゃん
title_romaji: otchan
body: <p>uncle; middle-aged man</p>
commentary: <p>This phrase is often used when calling for somebody or getting their attention. It should
  usually be used only with people you have a little history with. It can also be used with family members.</p><p>The
  female counterpart of おっちゃん is <a href="/words/257/">おばちゃん</a>.</p><p>Also see <a href="/words/255/">おっさん</a>.</p>
example: <p><strong>おっちゃん</strong>、これなんぼ？<br/> Hey grampa, how much is this?</p>
standard_kana: おじさん
standard_kanji: 叔父さん
word_types:
- wordtype_7
