title: あれへん
title_romaji: arehen
body: <p>doesn't exist (things)</p>
commentary: <p>あれへん is a <a href="/grammar-points/296/">negative form</a> of ある which does not occur in
  standard Japanese.</p><p>Some say <a href="/words/184/">あらへん</a> instead of あれへん.</p>
example: <p>最近、いっこもええこと<strong>あれへん</strong>わ。<br/> Nothing's been going on lately.</p>
standard_kana: ない
word_types:
- wordtype_18
