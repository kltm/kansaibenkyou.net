title: おなか(が)おおきい
title_romaji: onaka(ga)ookii
body: <p>have a full stomach</p>
commentary: <p>In most areas, such as Kanto, おなかがおおきい implies being pregnant.</p>
example: <p><strong>おなかおおきなった</strong>わ。もう食べられへん。<br/> I'm full. I can't eat anymore</p>
kanji: お腹(が)大きい
standard_kana: おなか(が)いっぱい
standard_kanji: お腹(が)一杯
