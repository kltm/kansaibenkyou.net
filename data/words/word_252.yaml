title: かまん
body: no problem
commentary: 'This is an abbreviation of かまわん.

  かまわん is the negative form of かまう, which means "to mind".

  かまわん → かまん

  Some people say かめへん or かまへん instead of かまん.

  However, among young people, かまん is more common than かめへん and かまへん.'
standard_kana: かまわない
standard_kanji: 構わない
