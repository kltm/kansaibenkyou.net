title: じゃまくさい
body: annoying; a pain; tiresome
commentary: 'In some areas outside of Kansai, this word can be used in the same sense as the base word
  じゃま (as in obstruction). However, in Kansai, じゃまくさい takes on the definition here.

  Also see じゃあくさい.'
standard_kana: めんどうくさい
standard_kanji: 面倒臭い
