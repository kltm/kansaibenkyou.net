title: ござそうろう
title_romaji: gozasourou
body: <p>dessert food with a puck-like in shape and crispy shell, filled with red bean paste and often
  served hot</p>
commentary: <p>There are many names for this food, but in Kansai, 御座候 (ござそうろう), <a href="/words/15/">回転焼き
  (かいてんやき)</a>, and <a href="/words/16/">太鼓焼き (たいこやき)</a> are common.</p>
kanji: 御座候
standard_kana: いまがわやき
standard_kanji: 今川焼(き)
