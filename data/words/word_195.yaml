title: もっぺん
title_romaji: moppen
body: <p>once more; one more time; again</p>
commentary: <p>"へん" is a Kansai-ben counter that takes the same space as the more standard "かい". Also
  see <a href="/words/196/">もっかい</a>.</p>
example: <p><strong>もっぺん</strong>言うて。<br/> Could you say that again?</p>
standard_kana: もういっかい
standard_kanji: もう一回
word_types:
- wordtype_15
