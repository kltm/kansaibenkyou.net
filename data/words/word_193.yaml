title: わし
title_romaji: washi
body: <p>I/me (masculine)</p>
commentary: <p>While this is generally a masculine word, there are some pockets where it is both a masculine
  and feminine word.</p><p>Also see <a href="/words/192/">わい</a>.</p>
example: <p>こいつ<strong>わし</strong>のむすこやねん。<br/> This is my son.</p>
standard_kana: おれ
standard_kanji: 俺
