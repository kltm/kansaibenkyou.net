id: word_365
drupal_node_id: 365
title: おちょける
title_romaji: ochokeru
body: <p>to joke; to clown</p>
commentary: <p>A person who jokes around all the time is called <a href="/words/222/">ちょけ</a> or <a href="/words/364/">おちょけ</a>.</p><p>Some
  people may say <a href="/words/221/">ちょける</a> instead.</p>
example: <p>うちの子、学校で<strong>おちょけて</strong>ばっかりでいっこも先生の話聞かんのですわ。<br/> My kid is always joking around at
  school; he never hears what the teacher says.</p>
standard_kana: ふざける
word_types:
- wordtype_17
