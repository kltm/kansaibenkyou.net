title: ばっちい
title_romaji: batchii
body: <p>dirty; unclean</p>
commentary: <p>ばっちい is a standard word, but in most places it is limited to baby talk. However, in some
  areas, including Kansai, this word is used by people of all ages.</p><p>Some people say ばばっちい, which
  is the original form of ばっちい.</p>
example: <p><strong>ばっちい</strong>手ぇでいらわんといて！<br/> Don't touch that with your dirty hands.</p>
standard_kana: きたない
standard_kanji: 汚い
