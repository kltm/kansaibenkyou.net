title: ばっちい
body: dirty; unclean
commentary: 'ばっちい is a standard word, but in most places it is limited to baby talk. However, in some
  areas, including Kansai, this word is used by people of all ages.

  Some people say ばばっちい, which is the original form of ばっちい.'
standard_kana: きたない
standard_kanji: 汚い
