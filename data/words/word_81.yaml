title: もうかりまっか
title_romaji: moukarimakka
body: <p>How's business?<br/> Are you making money?</p>
commentary: <p>もうかりまっか is no longer in common usage. The above conversation would not likely be used in
  real life, but may be used as shorthand for Kansai.</p>
example: '<p>A: <strong>もうかりまっか</strong>。<br/> B: ぼちぼちでんなあ。</p><p>A: How''s business?<br/> B: It''s alright.</p>'
