title: かまへん
body: no problem
commentary: 'This is an abbreviation of かまわへん.

  かまわへん is a negative form of かまう, which means "to mind".

  かまわへん → かまへん

  Some people say かめへん or かまん instead of かまへん.

  However, among young people, かまん is more common than かめへん and かまへん.

  The polite form of かまへん is かましまへん.'
standard_kana: かまわない
standard_kanji: 構わない
