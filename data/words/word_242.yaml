id: word_242
drupal_node_id: 242
title: とこ
body: place; location
commentary: 'とこ is often used with pronouns and other words such as title suffixes. For example:

  うっとこ...my place

  あんたとこ...your place

  おばちゃんとこ...aunt''s place

  先生んとこ...teacher''s place

  The grammar point 〜したところ also becomes 〜したとこ.'
standard_kana: ところ
standard_kanji: 所
