title: すっこい
body: devious; cunning
commentary: 'This word has a stronger feeling than すこい.

  こっすい and すっこい have the same meaning.

  While this word sounds similar to ずっこい, there are differences in meaning.

  Also see こすい, こっすい, すこい, and ずっこい'
standard_kana: ずるがしこい
standard_kanji: 狡賢い
