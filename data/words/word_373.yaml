title: ほいで
title_romaji: hoide
body: <p>and; so that; therefore</p>
commentary: <p>Other people use <a href="/words/168/">ほんで</a> or <a href="/words/209/">そんで</a> instead.</p><p>For
  more information, please see grammar point for <a href="/grammar-points/316/">ほんで／ほいで</a>.</p>
example: <p>車こわれてしもてん。<strong>ほいで</strong>、歩いてきたんや。<br/> My car broke down, so I walked here.</p>
standard_kana: それで
