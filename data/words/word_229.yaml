title: まいど
title_romaji: maido
body: <p>thank you (literally "every time")</p>
commentary: <p>A very common word in Kansai. It is usually used when the parties have repeated interaction.</p>
example: <p><strong>まいど</strong>おおきに。<br/> Thank you as always.</p>
kanji: 毎度
standard_kana: いつも
standard_kanji: 何時も
