title: ごくろうさん
body: Thank you for... / You worked hard...
commentary: 'In Kansai-ben the suffix? さん is often used for greetings. For more information, see Suffix
  “さん” and “ちゃん”.

  As with ごくろさま, this is usually only used for people below the speaker.'
standard_kana: ごくろうさま
standard_kanji: ご苦労様
