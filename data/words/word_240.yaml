id: word_240
drupal_node_id: 240
title: こすい
body: devious; cunning
commentary: 'This word has spread outside of Kansai, so you may hear it other places as well.

  こすい and すこい have the same meaning.

  This word has a weaker feeling than すっこい.

  Also see こっすい, すこい, すっこい.'
standard_kana: ずるがしこい
standard_kanji: 狡賢い
