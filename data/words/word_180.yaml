title: どないした
title_romaji: donaishita
body: <p>What happened?<br/> What's wrong?<br/> So what?</p>
commentary: <p>どう in Standard Japanese is <a href="/words/258/">どない</a> in Kansai-ben.</p>
example: <p><strong>どないした</strong>ん？顔色悪いで。<br/> What's wrong? You look pale.</p>
