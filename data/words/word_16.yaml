title: たいこやき
title_romaji: taikoyaki
body: <p>dessert food with a puck-like in shape and crispy shell, filled with red bean paste and often
  served hot</p>
commentary: <p>There are many names for this food, but in Kansai, <a href="/words/17/">御座候 (ござそうろう)</a>,
  <a href="/words/15/">回転焼き (かいてんやき)</a>, and 太鼓焼き (たいこやき) are common.</p>
kanji: 太鼓焼(き)
standard_kana: いまがわやき
standard_kanji: 今川焼(き)
