title: たいこやき
body: dessert food with a puck-like in shape and crispy shell, filled with red bean paste and often served
  hot
commentary: There are many names for this food, but in Kansai, 御座候 (ござそうろう), 回転焼き (かいてんやき), and 太鼓焼き (たいこやき)
  are common.
standard_kana: いまがわやき
standard_kanji: 今川焼(き)
