title: あほ(な)
title_romaji: aho(na)
body: <p>fool; stupid; idiot</p>
commentary: <p>According to some research on あほ and ばか, people in Kansai tend to feel that あほ is much
  softer than ばか, while people in Kanto feel the opposite. However, whichever word you use, the feeling
  depends on how you say it, so be careful.</p>
example: <p>おまえ、ほんまに<strong>あほ</strong>やなあ。<br/> You know, you're really an idiot.</p><p><strong>あほ</strong>なことばっかり言うてんと、早よ仕事しぃ。<br/>
  Stop talking garbage and get back to work.</p>
kanji: 阿呆(な)
standard_kana: ばか(な)
standard_kanji: 馬鹿(な)
