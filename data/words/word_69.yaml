title: あほ(な)
body: fool; stupid; idiot
commentary: According to some research on あほ and ばか, people in Kansai tend to feel that あほ is much softer
  than ばか, while people in Kanto feel the opposite. However, whichever word you use, the feeling depends
  on how you say it, so be careful.
standard_kana: ばか(な)
standard_kanji: 馬鹿(な)
