title: ごっつ(い)
title_romaji: gottsu(i)
body: <p>amazing; big; large; strong; great</p>
commentary: <p>The final い is sometimes dropped.<br/> Also see <a href="/words/133/">ごつい</a>.</p>
example: <p>それ<strong>ごっつ(い)</strong>おもろい話やなあ。<br/> That's an amazingly funny story.</p>
