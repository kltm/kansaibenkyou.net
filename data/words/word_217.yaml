title: じゃあくさい
title_romaji: jaakusai
body: <p>annoying; a pain; tiresome</p>
commentary: <p>This word is a slightly abbreviated version of <a href="/words/216/">じゃまくさい</a> and has
  a more non-standard feel to it.</p>
example: <p>こんなに書類あるんか。<strong>じゃあくさい</strong>なあ。<br/> I can't believe I have this much paperwork. It's
  such a pain.</p>
standard_kana: めんどうくさい
standard_kanji: 面倒臭い
