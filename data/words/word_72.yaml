id: word_72
drupal_node_id: 72
title: しんどい
body: tired; exhausted
commentary: 'While both しんどい and えらい can mean "tired", しんどい is more commonly used.

  In addition, えらい can express degree, while しんどい can not. For example, one could say えらいしんどい (very tired),
  but could not say しんどいえらい.'
standard_kana: くたびれる
