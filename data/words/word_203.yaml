id: word_203
drupal_node_id: 203
title: うっとこ
body: my house
commentary: 'うっとこ comes from うちのところ. の is often omitted. うち also means "I/me (feminine)" in Kansai-ben.

  うち(わたし) ＋ の ＋ とこ(ところ) → うっとこ

  Since うち is largely a feminine expression, うっとこ also tends to be, but there may be exceptions,'
standard_kana: わたしのいえ
standard_kanji: 私の家
word_types:
- wordtype_7
