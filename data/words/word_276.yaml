title: おあいそ
body: check; bill
commentary: 'This word is now broadly used in Japan, but originally came from Kansai.

  Even though many people still use this word in Kansai, this word could be construed as rude--おあいそ comes
  from あいそうもなく, which literally means "poor service".'
standard_kana: おかんじょう
standard_kanji: お勘定
