title: どないしょ
title_romaji: donaisho
body: <p>What should I/we do?</p>
commentary: <p>どう in Standard Japanese is <a href="/words/258/">どない</a> in Kansai-ben.</p>
example: <p><strong>どないしょ</strong>。お金いっこもないわ。<br/> What should I do? I don't have any money.</p>
