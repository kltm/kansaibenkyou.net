id: word_251
drupal_node_id: 251
title: いらんこと
body: unnecessary matter or thing
commentary: 'いらんこと comes from いらないこと and has a negative feeling. いらない is a negative form of いる which means
  "to need". Thus, いらんこと literary means "things that are not needed".

  An interfering person may be called いらんことしい in Kansai-ben.'
standard_kana: よけいなこと
standard_kanji: 余計なこと
