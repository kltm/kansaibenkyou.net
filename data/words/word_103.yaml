title: いちびる
title_romaji: ichibiru
body: <p>to mess around too much; to be unable to sit still</p>
commentary: <p>Also see <a href="/words/104/">いちびり</a>.</p>
example: <p>あいつ、最近、<strong>いちびってる</strong>なあ。<br/> Man, he really hasn't been able to stop screwing around
  lately, has he.</p>
