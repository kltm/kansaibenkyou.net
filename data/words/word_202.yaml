title: わて
title_romaji: wate
body: <p>I/me</p>
commentary: <p>This word is used more often by older men, but sometimes women as well.<br/> Also see <a
  href="/words/370/">あて</a>.</p>
example: <p><strong>わて</strong>、天王寺で仕事してますねん。<br/> I'm working in Tenouji.</p>
