title: ずっこい
body: cunning; sly; play unfair; foul
commentary: 'This word originally comes from ずるい, and is often used when kids are playing.

  While this word sounds similar to すっこい, there are differences in meaning.'
standard_kana: ずるい
standard_kanji: 狡い
