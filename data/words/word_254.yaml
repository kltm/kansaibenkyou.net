id: word_254
drupal_node_id: 254
title: おばはん
body: aunt; middle-aged woman
commentary: 'おばはん is similar to おばちゃん, but has a slightly ruder feel. You probably want to avoid saying
  おばはん to the person in question. It should not be used with family members. See おばちゃん for further usage
  notes.

  The male counterpart of おばはん is おっさん.'
standard_kana: おばさん
standard_kanji: 叔母さん
word_types:
- wordtype_7
suitability:
- icon: i-warning.png
  label: potentially rude
  tooltip: Indicates speech that could be upsetting to listeners.
