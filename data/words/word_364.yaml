title: おちょけ
title_romaji: ochoke
body: <p>person who jokes around all the time</p>
commentary: <p>This comes from the verb <a href="/words/365/">おちょける</a>.</p><p>Some people may say <a
  href="/words/222/">ちょけ</a> instead.</p>
example: <p>さとしは<strong>おちょけ</strong>やけど、サッカーする時だけはまじめやな。<br/> Satoshi is a real clown; the only time
  he's serious is when he's playing soccer.</p>
standard_kana: ふざけたことをする(いう)ひと
standard_kanji: ふざけたことをする(言う)人
