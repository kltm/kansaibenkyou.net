title: あかん
body: bad; impossible; hopeless; no; cannot
commentary: '"あかん" is one of the most recognizable Kansai words. One of the the reasons for its ubiquity
  are its many uses. See examples above.

  あかん can also be used in certain verb constructions, for example:

  週末も仕事せなあかんねん。

  I have to work during weekends.

  See the grammar page for せなあかん for more information.'
standard_kana: だめ
standard_kanji: 駄目
