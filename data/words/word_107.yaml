title: いわす
title_romaji: iwasu
body: <p>to beat someone up; to injure or break (body parts)</p>
commentary: <p>いわす is not usually used in a figurative sense.</p>
example: <p>ひざ<strong>いわして</strong>しもて、歩かれへんねん。<br/> I hurt my knee, so I can't walk.</p>
standard_kana: やっつける／(からだを)こわす
standard_kanji: やっつける／(体を)壊す
