id: word_78
drupal_node_id: 78
title: おおきに
title_romaji: ookini
body: <p>Thank you.</p>
commentary: <p>A very common word in Kansai and probably THE word Japanese people think of when they think
  of Kansai-ben.</p><p>Although it is still used, especially in stores, it's use has been declining recently.</p>
example: <p>毎度<strong>おおきに</strong>。また来てや。<br/> Thank you. Come back again.</p>
standard_kana: ありがとう
standard_kanji: 有り難う
word_types:
