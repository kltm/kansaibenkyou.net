title: ええ
body: good; fine
commentary: 'Just like いい in standard Japanese, ええ combines with other words to make another word such
  as かっこええ.

  Moreover, like いい, there are no conjugations such as えかった and えければ--use よかった and よければ.'
standard_kana: いい
