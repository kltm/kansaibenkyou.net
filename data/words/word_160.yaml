title: めっちゃ
title_romaji: metcha
body: <p>very; extremely</p>
commentary: <p>This short phrasing is more common among young people.<br/> Also see <a href="/words/263/">めちゃ</a>
  and <a href="/words/262/">めちゃめちゃ</a>.</p>
example: <p>この本、<strong>めっちゃ</strong>おもろいで。読んでみぃ。<br/> This book is really good. You should read it.</p>
standard_kana: すごく
standard_kanji: 凄く
