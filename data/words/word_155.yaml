id: word_155
drupal_node_id: 155
title: うち
body: I (feminine)
commentary: 'うち is a first person feminine singular pronoun. The plural form is うちら.

  うち can also mean house, home, and family. In that case, うち may be used by both men and women.

  Also see うっとこ.'
standard_kana: わたし
standard_kanji: 私
