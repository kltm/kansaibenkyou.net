title: おもろい
title_romaji: omoroi
body: <p>interesting; funny</p>
commentary: <p>The negative form of おもろい is <a href="/grammar-points/297/">おもろない</a> and <a href="/grammar-points/297/">おもんない</a>.</p>
example: <p>この本、<strong>おもろい</strong>で。読んでみ。<br/> This book is interesting. Give it a read.</p><p>おまえ、<strong>おもろい</strong>やっちゃなあ。<br/>
  Man, you are such a funny guy.</p>
