title: どないする
title_romaji: donaisuru
body: <p>What should (sb.) do?</p>
commentary: <p>どう in Standard Japanese is <a href="/words/258/">どない</a> in Kansai-ben.</p>
example: '<p>A: えらい雨やなあ。今日<strong>どないする</strong>？<br/> B: せやなあ。家で映画みよか。</p><p>A: It''s raining hard--what
  should we do?<br/> B: Well, maybe we could watch a movie at home?</p>'
