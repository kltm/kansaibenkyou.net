'154': 'Any verb besides a ru-verb? or an irregular verb?. Also known as a Yodan or
  Group 1 verb. For example: 行く, 書く, and 読む.'
'155': Abbreviation for verb.
'156': 'Abbreviation for adjective. For example: 大きい, 高い, 静かな, きれいな.'
'157': Abbreviation for noun.
'158': Words or morphemes? that attach to the beginning of a word to change its meaning
  or grammatical (e.g., "大" in 大好き).
'159': Words or morphemes? that attach to the end of a word to change its meaning
  or grammatical function (e.g., "さん" in 田中さん).
'160': 'Verbs that ends with る but are not u-verbs (such as 走る and 帰る) or irregular
  verbs. Also known as Ichidan or Group 2 verbs. For example: 食べる, 寝る, and 着る.'
'161': Suru-verbs (e.g., する, 勉強する) and 来る.
'162': Verbs that end with す, such as 話す and ためす.
'163': Verbs that ends with する (in the sense of "do"). (e.g., する, 勉強する, 料理する)
'164': The affirmative short non-past form for a verb.
'165': Also known as the "nai" form in standard Japanese.
'166': A collective term for the dictionary, simple past tense, and negative form.
  Also known as the plain form. For example 行く, 行かない, 行った, and 行かなかった.
'167': 'Also known as the polite form or masu-form.  For example: 行きます, 行きません, 行きました,
  and 行きませんでした.'
'168': 'The long (masu) verb form without the final "masu". This is also known as
  the pre-masu form. For example: 食べ, 行き, し, and き.'
'169': 'The short negative form? without the final "nai" in standard Japanese or "ん"
  in Kansai-ben. For example: 食べ, 行か, し, and こ in standard Japanese and 食べ, 行か, せ,
  and こ in Kansai-ben.'
'170': 'The short past tense form. For example: 食べた, 行った, した, and 来た.'
'171': 'For example: 食べて, 行って, して, and 来て.'
'172': 'For example: 食べている.'
'174': 'For example: 行こう in standard Japanese and 行こ in Kansai-ben.'
'175': 'For example: 食べられる, 行ける, できる, and 来られる.'
'176': 'For example: 食べられる, 行かれる, される, and 来られる.'
'177': 'For example: 食べさせる, 行かさせる, させる, and 来させる.'
'178': 'For example: 食べさせられる, 行かせられる, させられる, and 来させられる.'
'179': 'Abbreviation for i-adjective--an adjective that ends with an い. For example:
  大きい, 高い, 新しい.'
'180': 'Abbreviation for na-adjective--and adjective that ends with a な. For example:
  静かな, 便利な, きれいな.'
'181': 'In Japanese, essentially all of the "hiragana sounds" are one mora (with things
  like しゃ, きょ, and ん also counting as one). For example: いぬ has two moras and かんさいべんきょう
  has 8 moras.'
'182': The relative tone of a sound.
'183': Where the pitch? of a word starts to fall.
'184': 'When a voiced sound becomes voiceless. For example: the word です ("desu") is
  pronounced as "des" in standard Japanese.'
'185': For our purposes, when a vowel sound in a word exerts influence on the preceding
  vowel sound and makes it similar to itself.
'187': Verbal and non-verbal responses by a listener, such as "へえ〜" and eye contact.
'191': The units of meaning that comprise a word.
