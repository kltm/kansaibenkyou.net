title: Vたらあかん／Vんといて／Vんとって
title_romaji: Vtaraakan/Vntoite/Vntotte
body: <p>The prohibition expression Vてはいけない can become Vたらあかん in Kansai-ben. Similarly, the Vないで in standard
  Japanese can become either Vんといて or Vんとって in Kansai-ben. Paralleling standard Japanese, Vたらあかん expresses
  strong prohibition while Vんといて and Vんとって express a request for prohibition.</p>
example: <table><caption>Vた(ら)あかん</caption><tbody><tr><th>Standard</th><td>あぶないから、こっちに<em>来てはいけない</em>よ。</td></tr><tr><th>Kansai-ben</th><td>あぶないよって、こっち<em>来た(ら)あかん</em>で。</td></tr><tr><th>English</th><td>It's
  dangerous, so don't come in.</td></tr></tbody></table><table><caption>Vんといて</caption><tbody><tr><th>Standard</th><td>これ、私のだから<em>食べないで</em>ね。</td></tr><tr><th>Kansai-ben</th><td>これ、私のやから<em>食べんといて</em>や。</td></tr><tr><th>English</th><td>This
  is mine, so don't eat it.</td></tr></tbody></table>
