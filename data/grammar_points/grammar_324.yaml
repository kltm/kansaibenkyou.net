kansai_vs_standard: <h2>Vたらあかん</h2><table><tr><th>Standard</th><td><em>Vてはいけない</em></td></tr><tr><th>Kansai-ben</th><td><em>Vた(ら)*あかん</em></td></tr></table><p>*ら
  is often omitted.</p><h2>Vんといて／Vんとって</h2><table><tr><th>Standard</th><td><em>Vないで</em></td></tr><tr><th>Kansai-ben</th><td><em>Vんといて<br/>
  Vんとって</em></td></tr></table>
