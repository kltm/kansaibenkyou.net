  adjective that ends with an い. For example: 大きい, 高い, 新しい.">?</a></sup></h2><table><tr><td>i-Adj (ta-form<sup
  class="lexicon-indicator" title="The short past tense form. For example: 食べた, 行った, した, and 来た."><a class="lexicon-term"
  href="/taxonomy/term/170/" title="The short past tense form. For example: 食べた, 行った, した, and 来た.">?</a></sup>)
  +かて／かって</td></tr></table><h2>na-Adj<sup class="lexicon-indicator" title="Abbreviation for na-adjective--and
  adjective that ends with a な. For example: 静かな, 便利な, きれいな."><a class="lexicon-term" href="/taxonomy/term/180/"
  title="Abbreviation for na-adjective--and adjective that ends with a な. For example: 静かな, 便利な, きれいな.">?</a></sup></h2><table><tr><td>na-Adj
  (stem<sup also="" and="" as="" class="lexicon-indicator" example:="" for="" form.="" is="" known=""
  masu="" pre-masu="" the="" this="" title="The long (masu) verb form without the final "><a class="lexicon-term"
  href="/taxonomy/term/168/" title=''The long (masu) verb form without the final "masu". This is also
  known as the pre-masu form. For example: 食べ, 行き, し, and き.''>?</a></sup>) +やった+かて／かって</td></tr></table><h2>N<sup
  class="lexicon-indicator" title="Abbreviation for noun. "><a class="lexicon-term" href="/taxonomy/term/157/"
  title="Abbreviation for noun. ">?</a></sup>.</h2><table><tr><td>N (stem<sup also="" and="" as="" class="lexicon-indicator"
  example:="" for="" form.="" is="" known="" masu="" pre-masu="" the="" this="" title="The long (masu)
  verb form without the final "><a class="lexicon-term" href="/taxonomy/term/168/" title=''The long (masu)
  verb form without the final "masu". This is also known as the pre-masu form. For example: 食べ, 行き, し,
  and き.''>?</a></sup>) +やった+かて／かって</td></tr><tr><td>N (stem) +かて／かって</td></tr></table>'
formation_from_standard: '<h2>V<sup class="lexicon-indicator" title="Abbreviation for verb. "><a class="lexicon-term"
  href="/taxonomy/term/155/" title="Abbreviation for verb. ">?</a></sup></h2><table class="full-grid-table"><tr><th></th><th>V
  (affirmative) </th><th>V (negative) </th></tr><tr><th>Standard</th><td>食べ<em>て</em><em>も</em></td><td>食べ<em>なくて</em><em>も</em></td></tr><tr><th>Kansai-ben</th><td>食べ<em>た</em><em>かて</em><br/>
  食べ<em>た</em><em>かって</em></td><td>食べ<em>ん</em><em>かて</em><br/> 食べ<em>ん</em><em>かって</em></td></tr></table><h2>i-Adj<sup
  class="lexicon-indicator" title="Abbreviation for i-adjective--an adjective that ends with an い. For
  example: 大きい, 高い, 新しい."><a class="lexicon-term" href="/taxonomy/term/179/" title="Abbreviation for i-adjective--an
  adjective that ends with an い. For example: 大きい, 高い, 新しい.">?</a></sup></h2><table class="full-grid-table"><tr><th></th><th>i-Adj
  (affirmative)</th><th>i-Adj (negative)</th></tr><tr><th>Standard</th><td>大きく<em>て</em><em>も</em></td><td>大きく<em>なくて</em><em>も</em></td></tr><tr><th>Kansai-ben</th><td>大き<em>かった</em><em>かて</em><br/>
  大き<em>かった</em><em>かって</em></td><td>大き<em>なかった</em><em>かて</em><br/> 大き<em>なかった</em><em>かって</em></td></tr></table><h2>na-Adj<sup
  class="lexicon-indicator" title="Abbreviation for na-adjective--and adjective that ends with a な. For
  example: 静かな, 便利な, きれいな."><a class="lexicon-term" href="/taxonomy/term/180/" title="Abbreviation for
  na-adjective--and adjective that ends with a な. For example: 静かな, 便利な, きれいな.">?</a></sup>.</h2><table
  class="full-grid-table"><tr><th></th><th>na-Adj (affirmative)</th><th>na-Adj (negative)</th></tr><tr><th>Standard</th><td>しずか<em>であって</em><em>も</em></td><td>しずか<em>でなくて</em><em>も</em></td></tr><tr><th>Kansai-ben</th><td>しずか<em>やった</em><em>かて</em></td><td>しずか<em>やなかった</em><em>かて</em><br/>
  しずか<em>やのうた*</em><em>かて</em></td></tr></table><p>*のうたかて can be old‐fashioned.</p><h2>N<sup class="lexicon-indicator"
  title="Abbreviation for noun. "><a class="lexicon-term" href="/taxonomy/term/157/" title="Abbreviation
  for noun. ">?</a></sup></h2><table class="full-grid-table"><tr><th></th><th>N+も</th><th>N+で(あって)も</th></tr><tr><th>Standard</th><td>学生
  <em>も</em></td><td>学生<em>で(あって)</em><em>も</em></td></tr><tr><th>Kansai-ben</th><td>学生 <em>かて</em></td><td>学生<em>やった</em><em>かて</em></td></tr></table>'
kansai_vs_standard: <table><tr><th>Standard</th><td><em>＿＿も</em></td></tr><tr><th>Kansai-ben</th><td><em>＿＿かて<br/>
  ＿＿かって</em></td></tr></table>
