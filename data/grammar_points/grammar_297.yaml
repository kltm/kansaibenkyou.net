title: Aない／Aことあれへん／Aん(と)ちゃう
body: 'There are three negative forms for adjectives in Kansai-ben: Aない, Aことあれへん, and Aん(と)ちゃう.'
commentary: 'Sound change in the negative form of adjectives

  In the case where the vowel sound right before the final い in an i-Adjective is an [a], that [a] becomes
  an [o] sound and a ない is added.

  わ

  ら

  や

  ま

  は

  な

  た

  さ

  か

  あ

  ↓

  ↓

  ↓

  ↓

  ↓

  ↓

  ↓

  ↓

  ↓

  ↓

  を

  ろ

  よ

  も

  ほ

  の

  と

  そ

  こ

  お

  Standard (affirmative)

  はやい

  Kansai-ben (negative)

  はよない

  This same sound change can occur with the たい form.

  Standard (affirmative)

  行きたい

  Kansai-ben (negative)

  行きとない

  Negative form of おもしろい

  The negative forms of おもしろい are: おもしろない, おもろない, and おもんない. Selection is by region and personal preference.'
formation: 'Negative form of i-Adjectives

  Remove the く from くない

  Standard

  大きく　ない

  Kansai-ben

  大き__　ない

  Negative form of i-Adjectives and na-Adjectives

  Negative form of i-Adjectives and na-Adjectives: remove the は from 〜ことはない and add あれへん.

  i-Adj?

  na-Adj?

  Standard

  大きい　こと　は　ない

  しずかな　こと　は　ない

  Kansai-ben

  大きい　こと　__　あれへん

  しずかな　こと　__　あれへん

  Negative form of i-Adjectives and na-Adjectives: the の in (な)のとちがう becomes ん and the ちがう becomes ちゃう.

  i-Adj?

  na-Adj?

  Standard

  大きい　の　と　ちがう

  しずかな　の　と　ちがう

  Kansai-ben

  大きい　ん　と　ちゃう

  しずかな　ん　と　ちゃう'
