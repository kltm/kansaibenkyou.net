title: Vなあかん／Vんとあかん／Vんならん
title_romaji: Vnaakan/Vntoakan/Vnnaran
body: <p>The standard Japanese expressions for obligation and necessity (see the table below) mostly become
  Vなあかん in Kansai-ben. However, there are two exceptions that need to be mentioned.</p><p>The first exception
  is Vんとあかん, coming from the standard Japanese Vないといけない. Vなあかん and Vんとあかん have pretty much the same meaning.</p><p>The
  second exception is Vんなららん, coming from the standard Japanese Vなくてはならない. It is an expression that is
  very similar to Vなあかん, but it is only used for the speaker's own actions. In addition, Vんならん is somewhat
  softer than Vなあかん and may have a somewhat older feeling.</p>
example: <table><caption>Vなあかん</caption><tbody><tr><th>Standard</th><td>これ、明日までに<em>食べなければいけない</em>よ。</td></tr><tr><th>Kansai-ben</th><td>これ、明日までに<em>食べなあかん</em>で。</td></tr><tr><th>English</th><td>You
  have to eat this by tomorrow.</td></tr></tbody></table><table><caption>Vんとあかん</caption><tbody><tr><th>Standard</th><td>朝ご飯は毎日<em>食べなくちゃいけない</em>よ。</td></tr><tr><th>Kansai-ben</th><td>朝ご飯は毎日<em>食べんとあかん</em>で。</td></tr><tr><th>English</th><td>You
  must eat breakfast everyday.</td></tr></tbody></table><table><caption>Vんならん</caption><tr><th>Standard</th><td>明日も仕事あるから、そろそろ<em>寝なきゃ</em>なあ。</td></tr><tr><th>Kansa-beni</th><td>明日も仕事あるよって、そろそろ<em>寝んならん</em>なあ。</td></tr><tr><th>English</th><td>I
  have to go to work tomorrow so I'm going to turn in. </td></tr></table>
