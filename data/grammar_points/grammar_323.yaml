id: grammar_323
drupal_node_id: 323
title: Vなあかん／Vんとあかん／Vんならん
body: 'The standard Japanese expressions for obligation and necessity (see the table below) mostly become
  Vなあかん in Kansai-ben. However, there are two exceptions that need to be mentioned.

  The first exception is Vんとあかん, coming from the standard Japanese Vないといけない. Vなあかん and Vんとあかん have pretty
  much the same meaning.

  The second exception is Vんなららん, coming from the standard Japanese Vなくてはならない. It is an expression that
  is very similar to Vなあかん, but it is only used for the speaker''s own actions. In addition, Vんならん is
  somewhat softer than Vなあかん and may have a somewhat older feeling.'
example: 'Vなあかん

  Standard

  これ、明日までに食べなければいけないよ。

  Kansai-ben

  これ、明日までに食べなあかんで。

  English

  You have to eat this by tomorrow.

  Vんとあかん

  Standard

  朝ご飯は毎日食べなくちゃいけないよ。

  Kansai-ben

  朝ご飯は毎日食べんとあかんで。

  English

  You must eat breakfast everyday.

  Vんならん

  Standard

  明日も仕事あるから、そろそろ寝なきゃなあ。

  Kansa-beni

  明日も仕事あるよって、そろそろ寝んならんなあ。

  English

  I have to go to work tomorrow so I''m going to turn in.'
formation: 'Vなあかん

  V? (negative stem?) +な+あかん

  Vんとあかん

  V? (short negative form?) +と+あかん

  Vんならん

  V? (short negative form?) +ならん'
kansai_vs_standard: 'Vなあかん

  Standard

  Vなければならない

  Vなければいけない

  (Vなくちゃならない)

  (Vなくちゃいけない)

  Kansai-ben

  Vなあかん

  Vんとあかん

  Standard

  Vないといけない

  Kansai-ben

  Vんとあかん

  Vんならん

  Standard

  Vなければならない

  Kansai-ben

  Vんならん'
