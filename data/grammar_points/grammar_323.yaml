kansai_vs_standard: <h2>Vなあかん</h2><table><tr><th>Standard</th><td><em>Vなければならない<br/> Vなければいけない<br/> (Vなくちゃならない)<br/>
  (Vなくちゃいけない)</em></td></tr><tr><th>Kansai-ben</th><td><em>Vなあかん</em></td></tr></table><h2>Vんとあかん</h2><table><tr><th>Standard</th><td><em>Vないといけない</em></td></tr><tr><th>Kansai-ben</th><td><em>Vんとあかん</em></td></tr></table><h2>Vんならん</h2><table><tr><th>Standard</th><td><em>Vなければならない</em></td></tr><tr><th>Kansai-ben</th><td><em>Vんならん</em></td></tr></table>
