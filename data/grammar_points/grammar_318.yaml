id: grammar_318
drupal_node_id: 318
title: Vてくれへん／Vてんか
body: The standard Vてくれない, when used as a request, may become Vてくれへん and Vてんか in Kansai-ben. Vてんか is a
  shortened form of Vてくれへん, and may be used more by older people.
example: 'Vてくれへん(か)

  Standard

  これ、持ってくれない？

  Kansai-ben

  これ、持ってくれへん(か)？

  English

  Could you hold this for me?

  Vてんか

  Standard

  窓、閉めてくれない？

  Kansai-ben

  窓、閉めてんか。

  English

  Could you close the window?'
formation: 'Vてくれへん(か)

  V? (te-form? ) +くれへん+ (か)

  Vてんか

  V? (te-form?) +ん+か'
kansai_vs_standard: 'Standard

  Vてくれない

  Kansai-ben

  Vてくれへん(か)*

  Vてんか

  *The question marker か is often attached.'
