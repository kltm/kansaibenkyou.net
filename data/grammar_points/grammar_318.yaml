id: grammar_318
drupal_node_id: 318
title: Vてくれへん／Vてんか
title_romaji: Vtekurehen/Vtenka
body: <p>The standard Vてくれない, when used as a request, may become Vてくれへん and Vてんか in Kansai-ben. Vてんか is
  a shortened form of Vてくれへん, and may be used more by older people.</p>
example: <table><caption>Vてくれへん(か)</caption><tbody><tr><th>Standard</th><td>これ、<em>持ってくれない</em>？</td></tr><tr><th>Kansai-ben</th><td>これ、<em>持ってくれへん(か)</em>？</td></tr><tr><th>English</th><td>Could
  you hold this for me?</td></tr></tbody></table><table><caption>Vてんか</caption><tbody><tr><th>Standard</th><td>窓、<em>閉めてくれない</em>？</td></tr><tr><th>Kansai-ben</th><td>窓、<em>閉めてんか</em>。</td></tr><tr><th>English</th><td>Could
  you close the window?</td></tr></tbody></table>
formation: '<h2>Vてくれへん(か)</h2><table><tr><td>V<sup class="lexicon-indicator" title="Abbreviation for verb.
  "><a class="lexicon-term" href="/taxonomy/term/155/" title="Abbreviation for verb. ">?</a></sup> (te-form<sup
  class="lexicon-indicator" title="For example: 食べて, 行って, して, and 来て."><a class="lexicon-term" href="/taxonomy/term/171/"
  title="For example: 食べて, 行って, して, and 来て.">?</a></sup> ) +くれへん+ (か)</td></tr></table><h2>Vてんか</h2><table><tr><td>V<sup
  class="lexicon-indicator" title="Abbreviation for verb. "><a class="lexicon-term" href="/taxonomy/term/155/"
  title="Abbreviation for verb. ">?</a></sup> (te-form<sup class="lexicon-indicator" title="For example:
  食べて, 行って, して, and 来て."><a class="lexicon-term" href="/taxonomy/term/171/" title="For example: 食べて, 行って,
  して, and 来て.">?</a></sup>) +ん+か</td></tr></table>'
kansai_vs_standard: <table><tr><th>Standard</th><td><em>Vてくれない</em></td></tr><tr><th>Kansai-ben</th><td><em>Vてくれへん(か)*<br/>
  Vてんか</em></td></tr></table><p>*The question marker <a href="/grammar-points/308/">か</a> is often attached.</p>
