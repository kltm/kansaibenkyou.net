title: Particles “で” and “ど”
body: The Kansai-ben final particles で and ど have a function that draws attention to something that the
  listener might not know. In addition, they can also be used for assertion, question, admonition, and
  occasionally warning. These final particles are like よ and ぜ in standard Japanese.
commentary: <h2>で vs. ど</h2><p>Some people may use ど instead of で; ど has a more masculine and rough feeling.</p><table><caption>＿＿ど</caption><tbody><tr><th>Standard</th><td>いいかげんにしないと、怒る<em>ぜ</em>。</td></tr><tr><th>Kansai-ben</th><td>ええかげんにせんと、怒る<em>ど</em>。</td></tr><tr><th>English</th><td>I'm
  gunna get angry if you don't start behaving yourself.</td></tr></tbody></table></div><h2>で vs. がな</h2><p>で
  has a is similar, but weaker, meaning when compared to がな. Please see the <a href="311">がな</a> page
  for more details.</p>
example: <table><caption>＿＿で (assertion)</caption><tbody><tr><th>Standard</th><td>ちがう<em>よ</em>。今日は水曜だ<em>よ</em>。</td></tr><tr><th>Kansai-ben</th><td>ちゃうで。今日は水曜や<em>で</em>。</td></tr><tr><th>English</th><td>No,
  today is Wednesday.</td></tr></tbody></table></div><table><caption>＿＿で (admonition)</caption><tbody><tr><th>Standard</th><td>宿題は家でしないとだめだ<em>よ</em>。</td></tr><tr><th>Kansai-ben</th><td>宿題は家でせなあかん<em>で</em>。</td></tr><tr><th>English</th><td>You
  should do your homework at home.</td></tr></tbody></table>
kansai_vs_standard: <table><tr><th>Standard</th><td><em>＿＿＿よ<br /> ＿＿＿ぜ</em></td></tr><tr><th>Kansai-ben</th><td><em>＿＿＿で<br
  /> ＿＿＿ど</em></td></tr><tr></tr></table>
