id: grammar_329
drupal_node_id: 329
title: Vんと
title_romaji: Vnto
body: <p>Although Kansai-ben has the conditional clause __と__ like in standard Japanese, the negative
  form Vんと can have a different function depending on the intonation.</p><p>While Vんと without a downstep<sup
  class="lexicon-indicator" title="Where the pitch of a word starts to fall."><a class="lexicon-term"
  href="/taxonomy/term/183/" title="Where the pitch of a word starts to fall.">?</a></sup> is the normal
  conditional clause, Vんと <em>with</em> a downstep can mean "do not V<sup class="lexicon-indicator" title="Abbreviation
  for verb. "><a class="lexicon-term" href="/taxonomy/term/155/" title="Abbreviation for verb. ">?</a></sup>"
  or "without doing V", similar to Vないで(ください) and Vせずに in standard Japanese.</p>
example: <table><caption>Vないと (conditional clause)</caption><tbody><tr><th>Standard</th><td>そろそろ<em>行かないと</em>遅刻するよ。</td></tr><tr><th>Kansai-ben</th><td>そろそろ<em>行かんと</em>遅刻するで。</td></tr><tr><th>English</th><td>If
  you don't leave soon you'll be late.</td></tr></tbody></table><table><caption>Vないで (negative imperative)</caption><tbody><tr><th>Standard</th><td>仕事ばっかりしないでたまには私と遊んでよ。</td></tr><tr><th>Kansai-ben</th><td>仕事ばっかりせんとたまにはうちと遊んでや。</td></tr><tr><th>English</th><td>You
  shouldn't just work, you know—every once in a while you should come out with me.</td></tr></tbody></table><table><caption>Vせずに</caption><tbody><tr><th>Standard</th><td>あいつ、全然仕事<em>せずに</em>携帯ばっかりさわってるよ。</td></tr><tr><th>Kansai-ben</th><td>あいつ、いっこも仕事<em>せんと</em>携帯ばっかりいじっとるわ。</td></tr><tr><th>English</th><td>He's
  always fiddling with his cell phone and not doing any work.</td></tr></tbody></table>
kansai_vs_standard: <table><tr><th>Standard</th><td><em>Vないと<br/> Vないで(ください)<br/> Vせずに</em></td></tr><tr><th>Kansai-ben</th><td><em>Vんと</em></td></tr></table>
