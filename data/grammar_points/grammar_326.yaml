title: Vてまう
body: The Vてしまう of standard Japanese, when used to indicate completion, can become Vてまう in Kansai-ben
commentary: '<h2>Question forms: Vて(し)まえへん and Vて(し)まわん</h2><p>The question form of Vてまう is Vて(し)まえへん
  or Vて(し)まわん, with the choice up to the speaker.<br /> Both are pronounced with a rising intonation.</p><table><caption>Vて(し)まえへん</caption><tbody><tr><th>Standard</th><td>お父さん帰ってこないうちに<em>食べてしまわない</em>？</td></tr><tr><th>Kansai-ben</th><td>お父ちゃん帰ってこんまに<em>食べて(し)まえへん</em>？</td></tr><tr><th>English</th><td>Should
  we finish eating before dad gets home?</td></tr></tbody></table>'
example: <table><tr><th>Standard</th><td>まだ時間あるから、おさら<em>洗ってしまう</em>よ。</td></tr><tr><th>Kansai-ben</th><td>まだ時間あるから、おさら<em>洗ってまう</em>わ。</td></tr><tr><th>English</th><td>There's
  still a little time, I'll finish up the dishes.</td></tr></table>
formation: <table><tr><td>V (te-form) +まう</td></tr></table>
formation_from_standard: <table class="full-grid-table"><tr><th>Standard</th><td>行って <em>しまう</em></td></tr><tr><th>Kansai-ben</th><td>行って
  <em> まう</em></td></tr></table>
kansai_vs_standard: <table><tr><th>Standard</th><td><em>Vてしまう</em></td></tr><tr><th>Kansai-ben</th><td><em>Vてまう</em></td></tr><tr></tr></table>
