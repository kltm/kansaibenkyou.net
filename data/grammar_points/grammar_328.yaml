title: たら
body: In Kansai-ben, the conditional clause (れ)ば is rarely used. Instead, the conditional clause たら is
  heavily used--to the extent that it is often used in cases where it would be not consider appropriate
  in standard Japanese.
commentary: 'Kansai people and (れ)ば

  For most Kansai people, (れ)ば sounds too formal, so たら is used for most any case where one wants to use
  a conditional expression.

  The negative form of たら

  Since there are various negative forms in Kansai-ben (Vへん／Vん), the negative form of たら clauses are also
  varied. For example, there are: Vなかったら, Vなんだら, Vんかったら, Vへんかったら, Vへんなんだら, and more...

  Vなかったら

  Vなんだら

  Vんかったら

  Vへんかったら

  Vへんなんだら

  食べる

  食べなかったら

  食べなんだら

  食べんかったら

  食べへんかったら

  食べへんなんだら'
example: 'Standard

  昨日もっと勉強すればよかった。

  Kansai-ben

  昨日もっと勉強したらよかった。

  English

  I should have studied more yesterday.

  Standard

  電話してくれれば迎えに行くよ。

  Kansai-ben

  電話してくれたら迎えに行くで。

  English

  If you call me, I''ll come and pick you up.'
