kansai_vs_standard: <h2>Vてもええ</h2><table><tr><th>Standard</th><td><em>Vてもいい</em></td></tr><tr><th>Kansai-ben</th><td><em>Vて(も)*ええ</em></td></tr></table><p>*も
  may be omitted.</p><h2>Vてもかめへん／Vてもかまへん</h2><table><tr><th>Standard</th><td><em>Vてもかまわない</em></td></tr><tr><th>Kansai-ben</th><td><em>Vて(も)かめへん<br/>
  Vてもかまへん</em></td></tr></table>
