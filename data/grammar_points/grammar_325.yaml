id: grammar_325
drupal_node_id: 325
title: Vてもええ／Vてもかめへん／Vてもかまへん／Vてもかまん
body: The standard Japanese expression to give or ask for permission, Vてもいい, can become Vてもええ in Kansai-ben.
  Similarly, The standard Japanese Vてもかまわない can become either Vてもかめへん, Vてもかまへん, or Vてもかまん in Kansai-ben.
  For the differences between the three, please see the usage notes for かめへん, かまへん, and かまん.
example: 'Vて(も)ええ

  Standard

  このCD持って帰ってもいいよ。

  Kansai-ben

  このCD持って帰って(も)ええよ。

  English

  If you want, you can take this CD home.

  Vてもかめへん

  Standard

  今日、電車できたから、酒を飲んでもいいんだ。

  Kansai-ben

  今日、電車で来たよって、酒飲んでもかめへんねん。

  English

  I took a train, so I can drink today.'
formation: 'Vて(も)ええ

  V? (te-form?) + (も) +ええ

  Vてもかめへん／Vてもかまへん

  V? (te-form?) +も+かめへん／かまへん'
kansai_vs_standard: 'Vてもええ

  Standard

  Vてもいい

  Kansai-ben

  Vて(も)*ええ

  *も may be omitted.

  Vてもかめへん／Vてもかまへん

  Standard

  Vてもかまわない

  Kansai-ben

  Vて(も)かめへん

  Vてもかまへん'
