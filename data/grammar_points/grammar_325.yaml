title: Vてもええ／Vてもかめへん／Vてもかまへん／Vてもかまん
title_romaji: Vtemoee/Vtemokamehen/Vtemokamahen/Vtemokaman
body: <p>The standard Japanese expression to give or ask for permission, Vてもいい, can become Vてもええ in Kansai-ben.
  Similarly, The standard Japanese Vてもかまわない can become either Vてもかめへん, Vてもかまへん, or Vてもかまん in Kansai-ben.
  For the differences between the three, please see the usage notes for <a href="/words/125/">かめへん</a>,
  <a href="/words/124/">かまへん</a>, and <a href="/words/252/">かまん</a>.</p>
example: <table><caption>Vて(も)ええ</caption><tbody><tr><th>Standard</th><td>このCD<em>持って帰ってもいい</em>よ。</td></tr><tr><th>Kansai-ben</th><td>このCD<em>持って帰って(も)ええ</em>よ。</td></tr><tr><th>English</th><td>If
  you want, you can take this CD home.</td></tr></tbody></table><table><caption>Vてもかめへん</caption><tbody><tr><th>Standard</th><td>今日、電車できたから、酒を<em>飲んでもいい</em>んだ。</td></tr><tr><th>Kansai-ben</th><td>今日、電車で来たよって、酒<em>飲んでもかめへん</em>ねん。</td></tr><tr><th>English</th><td>I
  took a train, so I can drink today.</td></tr></tbody></table>
