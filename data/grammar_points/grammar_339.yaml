title: Short forms of verbs
body: As in standard Japanese, there are many short forms for verbs in Kansai-ben.
kansai_vs_standard: <table class="full-grid-table"><tr><th>Standard<br /> (long)</th><th>Standard<br />
  (short)</th><th>Kansai-ben<br /> (long)</th><th>Kansai-ben<br /> (short)</th><th>Example</th></tr><tr><td>Vておかなければ</td><td>Vておかなきゃ</td><td>Vておかな／<br
  /> Vておかんと</td><td>Vとかな／<br /> Vとかんと</td><td>食べとかなあかん／<br /> 食べとかんとあかん</td></tr><tr><td>Vていなければ<br />
  (Vておらなければ)</td><td>Vていなきゃ<br /><span class="nowrap">(Vておらなきゃ)</span></td><td>×<br /> Vておらな／<br /> Vておらんと</td><td>Vてな／Vてんと<br
  /> Vとらな／<br /> Vとらんと</td><td>食べてなあかん／<br /> 食べてんとあかん<br /> 食べとらなあかん／<br /> 食べとらんとあかん</td></tr><tr><td>Vてあげなければ</td><td>Vてあげなきゃ</td><td>Vてあげな／<br
  /> Vてあげんと</td><td>Vたげな／Vたげんと</td><td>食べたげなあかん／<br /> 食べたげんとあかん</td></tr><tr><td><span class="nowrap">Vてしまわなければ</span></td><td>Vてしまわなきゃ</td><td>Vてしまわな／<br
  /> Vてしまわんと</td><td>Vてまわな／<br /> Vてまわんと</td><td>食べてまわなあかん／<br /><span class="nowrap">食べてまわんとあかん</span></td></tr></table>
