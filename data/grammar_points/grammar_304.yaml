title: Particle “わ”
body: The final particle わ in Kansai-ben is basically like the よ final particle in standard Japanese.
commentary: <h2>The Standard Japanese わ vs. the Kansai-ben わ</h2><p>While the Kansai-ben わ has the same
  form as the standard Japanese わ, unlike in standard Japanese, it is used by both men and women. In addition,
  the Kansai-ben わ is pronounced with falling intonation.</p><table><tr><th>Standard</th><td>この魚すごく安い<em>わ</em>。↑<br
  /><p id="audioplayer-1" class="kb-audio"><a href="../external/st_sakana.mp3">[↓]</a></p></td></tr><tr><th>Kansai-ben</th><td>この魚めっちゃ安い<em>わ</em>。↓<br
  /><p id="audioplayer-2" class="kb-audio"><a href="../external/gr_fish.mp3">[↓]</a></p></td></tr><tr><th>English</th><td>This
  fish is really cheap.</td></tr></table></div><h2>The わい of adding emphasis</h2><p>Adding い after the
  final わ (making わい) can further emphasize the meaning.</p><table><tr><th>Standard</th><td>もう何回も聞いた<em>よ</em>。</td></tr><tr><th>Kansai-ben</th><td>もう何べんも聞いた<em>わい</em>。</td></tr><tr><th>English</th><td>I
  already heard you.</td></tr></table>
example: <table><tr><th>Standard</th><td>これ、もういらないからあげる<em>よ</em>。</td></tr><tr><th>Kansai-ben</th><td>これ、もういらんからあげる<em>わ</em>。</td></tr><tr><th>English</th><td>I
  don't need this anymore, so you can have it.</td></tr></table>
kansai_vs_standard: <table><tr><th>Standard</th><td><em>＿＿＿よ</em></td></tr><tr><th>Kansai-ben</th><td><em>＿＿＿わ</em></td></tr><tr></tr></table>
