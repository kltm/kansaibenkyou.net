title: ようV／ようVへん／ようVん
body: 'Unlike standard Japanese, there are two types of potential form? depending on the situation: ability
  potential and situational potential.  The ability potential, ようV, is often used with question and negative
  (the negative form is ようVへん and ようV). The situational potential is the same as in standard Japanese.'
commentary: <h2>The difference between ようVへん and ようVん</h2><p>While ようVへん is used when the subject is third
  person (he/she/it), ようVん is mainly used when the subject is first person (I). It should be noted that
  ようVん can be used with questions when the subject is the second person (you).</p></div><h2>Subjectivity
  with ようV and ようVん</h2><p>ようVん is used not only with the ability negative potential but also when expressing
  disgust, blame, and surprise. In the latter case, the よう in ようVん is the same meaning of よく in standard
  Japanese.</p><table><caption>disgust/blame</caption><tbody><tr><th>Standard</th><td>そんな恥ずかしいこと<em>よくできる</em>ね。</td></tr><tr><th>Kansai-ben</th><td>そんな恥ずかしいこと<em>ようする</em>なあ。</td></tr><tr><th>English</th><td>I
  can't do that--it would be so embarrassing.</td></tr></tbody></table><table><caption>surprise</caption><tbody><tr><th>Standard</th><td>君、<em>よく食べる</em>ねえ。</td></tr><tr><th>Kansai-ben</th><td>あんた、<em>よう食べる</em>なあ。</td></tr><tr><th>English</th><td>You
  sure do eat a lot.</td></tr></tbody></table><table><caption>disgust/blame</caption><tbody><tr><th>Standard</th><td>そんなひどいこと<em>できない</em>よ。</td></tr><tr><th>Kansai-ben</th><td>そんなえげつないこと<em>ようせん</em>わ。</td></tr><tr><th>English</th><td>I
  couldn't do something that awful.</td></tr></tbody></table></div><h2>よう言わんわ</h2><p>The common phrase
  "よう言わんわ" does not just mean to "not have much to say", but implies that the speaker is strongly disgusted
  and they have nothing to say about the topic.</p><table><tr><th>Standard</th><td>あいつ、またうわきしたのか。もう、<em>何も言う言葉がないよ</em>。</td></tr><tr><th>Kansai-ben</th><td>あいつ、またうわき*しよったんか。もう、<em>よう言わんわ</em>。</td></tr><tr><th>English</th><td>Has
  he been cheating again? I don't have anything more to say (about that).</td></tr></table><p>*うわき = unfaithful;
  cheat on someone</p></div><h2>When to use V (potential) へん and V (potential) ん</h2><p>Only V (potential)
  へん and V (potential) ん can be used when the speaker wants to do something but they are unable to. ようVへん
  and ようVん cannot be used in that case.</p><table><caption>V (potential) へん</caption><tbody><tr><th>Standard</th><td>今、ダイエット中だから、甘いもの<em>食べられない</em>んだ。</td></tr><tr><th>Kansai-ben</th><td>今、ダイエット中やから、甘いもん<em>食べられへん</em>ねん。</td></tr><tr><th>English</th><td>Since
  I'm on a diet, I can't have anything sweet.</td></tr></tbody></table>
example: <h2>Ability potential</h2><table><caption>ようV</caption><tbody><tr><th>Standard</th><td>英語、<em>話せる</em>？</td></tr><tr><th>Kansai-ben</th><td>英語、<em>よう話す</em>か？</td></tr><tr><th>English</th><td>Can
  you speak in English?</td></tr></tbody></table></div><table><caption>ようVへん</caption><tbody><tr><th>Standard</th><td>うちの弟、<em>よう泳がへん</em>ねん。</td></tr><tr><th>Kansai-ben</th><td>私の弟、<em>泳げない</em>んだ。</td></tr><tr><th>English</th><td>My
  younger brother can't swim.</td></tr></tbody></table></div><table><caption>ようVん</caption><tbody><tr><th>Standard</th><td>足痛いから、<em>走れない</em>よ。</td></tr><tr><th>Kansai-ben</th><td>足痛いよって、<em>よう走らん</em>わ。</td></tr><tr><th>English</th><td>I
  can't run because my legs hurt.</td></tr></tbody></table></div><h2>Situational potential<br /><h2></h2></h2><table><caption>ようVん</caption><tbody><tr><th>Standard</th><td>それはひみつだから、<em>言えない</em>んだ。</td></tr><tr><th>Kansai-ben</th><td>それはひみつやから、<em>言えへん</em>ねん。</td></tr><tr><th>English</th><td>I
  can't tell you because it's a secret.</td></tr></tbody></table>
