title: Particle omission of “と” and “の”
body: Like standard Japanese, particles are tend to be omitted, especially in casual speech. However,
  there are some differences in the ways that they are dropped in Kansai-ben and standard Japanese.
example: 'quotation particle と

  the omission of と

  Standard

  弟(が)、彼女(が)できたと言って(い)たよ。

  Kansai-ben

  弟、彼女できたいうてたで。

  弟、彼女できた(っ)ちゅう*てたで。

  English

  My (younger) brother said that he got a girlfriend.

  * 〜いう and 〜(っ)ちゅう have the same meaning.

  と omission

  Standard

  王将というレストラン(を)知って(い)る？

  Kansai-ben

  王将いうレストラン知ってる？

  王将(っ)ちゅうレストラン知ってる？

  English

  Have you heard of a restaurant called Ousho?

  possessive particle の

  The possessive marker の is often omitted in front of the noun とこ (所).

  the omission of の

  Standard

  あなたの所／家

  先生の所／家

  私の家

  Kansai-ben

  あんたとこ

  先生とこ

  うっとこ*

  English

  your place/house

  teacher''s place/house

  my house

  *The meaning of うっ in うっとこ is the same as うち (私／家).'
