  <em>から／ので</em></td><td>しずか<em>だ</em><em>から／ので</em></td><td>学生<em>だ</em><em>から／ので</em></td></tr><tr><th>Kansai-ben</th><td>行く
  <em>よって／さかい</em></td><td>大きい <em>よって／さかい</em></td><td>しずか<em>や</em><em>よって／さかい</em></td><td>学生<em>や</em><em>よって／さかい</em></td></tr></table>'
kansai_vs_standard: <table><tr><th>Standard</th><td><em>(reason) から (consequence)<br/> (reason) ので (consequence)</em></td></tr><tr><th>Kansai-ben</th><td><em>(reason)
  よって (consequence)<br/> (reason) さかい (consequence)</em></td></tr></table>
