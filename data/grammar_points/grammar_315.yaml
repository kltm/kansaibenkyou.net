title: よって／さかい
body: 'The standard Japanese conjunctions for providing a reason, から and ので, may become よって and さかい in
  Kansai-ben (with the choice depending on the area or personal background such as age).

  よって is mostly used by older people while さかい is used by a wider range of ages. In addition, younger
  people may opt to just use から and ので with a Kansai-ben intonation.

  It should also be noted that さかい may become さかいに, さかいで, or さけ, with the difference depending on the
  region or speaker preference.'
commentary: '<h2>Negative: へんよって, へんさかい</h2><p>Like the standard から and ので, negative marker comes before
  よって and さかい.</p><table><caption>へんよって</caption><tbody><tr><th>Standard</th><td>明日は会社<em>ないから</em>いっぱい寝られるよ。</td></tr><tr><th>Kansai-ben</th><td>明日は会社<em>あらへんよって</em>ごっつう寝られるわ。</td></tr><tr><th>English</th><td>I
  don''t have work tomorrow, so I can sleep in.</td></tr></tbody></table></div><h2>Polite form (long form):
  でっさかい, まっさかい</h2><p>Adding です or ます in front of よって and さかい can make the sentence more polite. In the
  case of さかい, devoicing may occur before さかい. ですさかい may becomes でっさかい and ますさかい may become まっさかい.</p><table><caption>まっさかい</caption><tbody><tr><th>Standard</th><td>３時ごろ<em>出ますので</em>、４時ごろ着くと思いますよ。</td></tr><tr><th>Kansai-ben</th><td>３時ごろ<em>出まっさかい</em>、４時ごろ着くと思いますわ。</td></tr><tr><th>English</th><td>I''ll
  be leaving around three, so I think I''ll get there around four.</td></tr></tbody></table>'
example: <table><caption>(reason) よって (consequence)</caption><tbody><tr><th>Standard</th><td>このおせんべいおいしい<em>から</em>、食べてみて。</td></tr><tr><th>Kansai-ben</th><td>このおせんべいおいしい<em>よって</em>、食べてみ。</td></tr><tr><th>English</th><td>Try
  this rice cracker--it's good.</td></tr></tbody></table></div><table><caption>(reason) さかい (consequence)</caption><tbody><tr><th>Standard</th><td>明日、先生のところに行く<em>から</em>、わたしておくよ。</td></tr><tr><th>Kansai-ben</th><td>明日、先生とこ行く<em>さかい</em>、わたしとくわ。</td></tr><tr><th>English</th><td>I'll
  be seeing the teacher tomorrow, so I'll give it to them.</td></tr></tbody></table>
formation: <table><tr><th>V and i-Adj</th><td>short form+よって／さかい</td></tr><tr><th>na-Adj and N</th><td>stem+や+よって／さかい</td></tr></table>
formation_from_standard: <table class="full-grid-table"><tr><th></th><th>V</th><th>i-Adj</th><th>na-Adj</th><th>N</th></tr><tr><th>Standard</th><td>行く
  <em>から／ので</em></td><td>大きい <em>から／ので</em></td><td>しずか<em>だ</em><em>から／ので</em></td><td>学生<em>だ</em><em>から／ので</em></td></tr><tr><th>Kansai-ben</th><td>行く
  <em>よって／さかい</em></td><td>大きい <em>よって／さかい</em></td><td>しずか<em>や</em><em>よって／さかい</em></td><td>学生<em>や</em><em>よって／さかい</em></td></tr></table>
