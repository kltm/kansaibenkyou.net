id: grammar_322
drupal_node_id: 322
title: Vな
title_romaji: Vna
body: '<p>Like standard Japanese, Vな is also used in Kansai-ben for strong prohibition. However, instead
  of the dictionary form<sup class="lexicon-indicator" title="The affirmative short non-past form for
  a verb."><a class="lexicon-term" href="/taxonomy/term/164/" title="The affirmative short non-past form
  for a verb.">?</a></sup> as in standard Japanese, the stem<sup class="lexicon-indicator" title=''The
  long (masu) verb form without the final "masu". This is also known as the pre-masu form. For example:
  食べ, 行き, し, and き.''><a class="lexicon-term" href="/taxonomy/term/168/" title=''The long (masu) verb
  form without the final "masu". This is also known as the pre-masu form. For example: 食べ, 行き, し, and
  き.''>?</a></sup> form is used.</p>'
commentary: '<h2>Final るand Vんな</h2><p>In the verbs that end with る, that final る often changes into ん.</p><table
  class="full-grid-table"><tbody><tr><th>Standard</th><td>食べ<em>る</em>な</td><td>寝<em>る</em>な</td></tr><tr><th>Kansai-ben</th><td>食べ<em>ん</em>な</td><td>寝<em>ん</em>な</td></tr><tr><th>Kansai-ben<br/>
  (basic form)</th><td>食べな</td><td>寝ぇな</td></tr></tbody></table><table><caption>Vんな</caption><tbody><tr><th>Standard</th><td>こんなところで<em>寝るな</em>よ。</td></tr><tr><th>Kansai-ben</th><td>こんなとこで<em>寝んな</em>や。</td></tr><tr><th>English</th><td>You
  can''t sleep here.</td></tr></tbody></table><h2>The function of Vな can depend on the accent</h2><p>Vな
  can have different function depending on the accent.</p><p>Vな with a downstep<sup class="lexicon-indicator"
  title="Where the pitch of a word starts to fall."><a class="lexicon-term" href="/taxonomy/term/183/"
  title="Where the pitch of a word starts to fall.">?</a></sup> = negative imperative (prohibition)<br/>
  Vな without a downstep = affirmative imperative (giving advice)</p><table class="full-grid-table"><tr><th></th><th>
  (LHL) 飲みな</th><th> (LLL) 飲みな</th></tr><tr><th>Standard</th><td>もう、さけ<em>飲むな</em>よ。</td><td>あついからゆっくり<em>飲むんだよ</em>。</td></tr><tr><th>Kansai-ben</th><td>もう、さけ<em>飲みな</em>や。<br/><p
  class="kb-audio" id="audioplayer-1"><a href="/assets/audio/gr_sakenomi.mp3">[↓]</a></p></td><td>あついからゆっくり<em>飲みな</em>。<br/><p
  class="kb-audio" id="audioplayer-2"><a href="/assets/audio/gr_atsunomi.mp3">[↓]</a></p></td></tr><tr><th>English</th><td>You
  shouldn''t drink anymore.</td><td>It''s hot so drink it slowly.</td></tr></table><p>L = low pitch<sup
  class="lexicon-indicator" title="The relative tone of a sound."><a class="lexicon-term" href="/taxonomy/term/182/"
  title="The relative tone of a sound.">?</a></sup><br/> H = high pitch</p><h2>Other phrases of prohibition:
  Vたらあかん and Vんとき</h2><p>Besides Vな, there are other phrases for prohibition such as <a href="/grammar-points/324/">Vたらあかん</a>
  and <a href="/grammar-points/333/">Vんとき</a>. The differences between these three are in the degree of
  prohibition.</p><table class="full-grid-table"><tr><th>Standard</th><th>Kansai-ben</th><th>English</th></tr><tr><td>Vな</td><td>Vな</td><td>Don''t
  V<sup class="lexicon-indicator" title="Abbreviation for verb. "><a class="lexicon-term" href="/taxonomy/term/155/"
  title="Abbreviation for verb. ">?</a></sup></td></tr><tr><td>Vたらだめ</td><td>Vたらあかん</td><td>You shouldn''t...</td></tr><tr><td>V
  しないで<br/> from shinaide okinasai</td><td>Vんとき</td><td>Don''t V [fairly low key]</td></tr></table><table><caption>Vんとき</caption><tbody><tr><th>Standard</th><td>明日、二日よいになるから、もう<em>飲まないで</em>。</td></tr><tr><th>Kansai-ben</th><td>明日、二日よいになるよって、もう<em>飲まんとき</em>。</td></tr><tr><th>English</th><td>If
  you don''t stop drinking you''ll have a hangover tomorrow.</td></tr></tbody></table>'
example: '<p>With u-verbs and ru-verbs that have stem<sup class="lexicon-indicator" title=''The long (masu)
  verb form without the final "masu". This is also known as the pre-masu form. For example: 食べ, 行き, し,
  and き.''><a class="lexicon-term" href="/taxonomy/term/168/" title=''The long (masu) verb form without
  the final "masu". This is also known as the pre-masu form. For example: 食べ, 行き, し, and き.''>?</a></sup>
  with two or more characters.</p><table class="full-grid-table"><tr><th>Standard</th><td>寝<em>る</em><em>な</em></td><td><em>する</em><em>な</em></td><td><em>くる</em><em>な</em></td></tr><tr><th>Kansai-ben</th><td>寝<em>ぇ</em><em>な</em></td><td><em>しぃ</em><em>な</em></td><td><em>きぃ</em><em>な</em></td></tr></table><p>With
  ru-verbs that have single character stem<sup class="lexicon-indicator" title=''The long (masu) verb
  form without the final "masu". This is also known as the pre-masu form. For example: 食べ, 行き, し, and
  き.''><a class="lexicon-term" href="/taxonomy/term/168/" title=''The long (masu) verb form without the
  final "masu". This is also known as the pre-masu form. For example: 食べ, 行き, し, and き.''>?</a></sup>
  and irregular verbs.</p><table class="full-grid-table"><tr><th>Standard</th><td>行<em>く</em><em>な</em></td><td>食<em>べる</em><em>な</em></td></tr><tr><th>Kansai-ben</th><td>行<em>き</em><em>な</em></td><td>食<em>べ
  </em><em>な</em></td></tr></table>'
