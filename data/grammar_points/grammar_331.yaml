id: grammar_331
drupal_node_id: 331
title: Vてる／Vとる
body: 'The standard progressive, conditional, or stative Vている may become Vてる or Vとる in Kansai-ben.  Vてる
  obviously derives from Vている, while Vとる derives from Vておる. While originally the latter may have been
  considered more polite, it is now more about personal taste.

  It should be noted that in casual speech, even standard Japanese may drop the い form いる in the Vている
  form.'
commentary: 'Vとう in Kobe

  Vとう is more common than Vてる and Vとる in Kobe and its surrounding area.

  Vてる and Vとる as conditional and stative forms

  Like standard Japanese, Vてる and Vとる are not only used as progressive, but also conditional and stative
  forms

  Progressive

  Standard

  今、宿題しているんだ。

  Kansai-ben

  今、宿題してんねん。

  English

  I''m doing my home work right now.

  Stative

  Standard

  あの人、結婚しているの？

  Kansai-ben

  あの人、結婚してんの？

  English

  Are they married?

  Conditional

  Standard

  この部屋、クーラーついている？

  Kansai-ben

  この部屋、クーラーついてる？

  English

  Is the air conditioner on in here?

  ている form of いる = いてる

  While there is no Vている form of いる in standard Japanese, there is in Kansai-ben--いてる and いとる.  There
  is no such parallel for ある.

  いてる

  Standard

  今日はずっと家にいるよ。

  Kansai-ben

  今日はずっと家にいてるよ。

  English

  I''ll be staying home all day today.'
example: 'Vてる

  Standard

  A:　何して(い)るの？

  B:　めがねを探しているんだ。

  Kansai-ben

  A:　何してるん？

  B:　めがね、探してんねん*。

  English

  A:　What are you doing?

  B:　I''m looking for my glasses.

  * When Vてる and Vとる are used with sentence endings, the final る may become ん.

  Vとる

  Standard

  あの人、ずっとこっちを見ているよ。気持ち悪いねえ。

  Kansai-ben

  あの人、ずっとこっち見とるで。気持ち悪いなあ。

  English

  That person has been staring at us the whole time. It''s unnerving.'
formation: 'Vてる

  V? (te-form?) +る

  Vとる

  V? (like the te-form?, but use と instead of the final て) +る'
formation_from_standard: 'Vてる

  V? (non-past )

  V (past)

  Standard

  見　ている

  見　ていた

  Kansai-ben

  見　て　る

  見　て　た

  Vとる

  V? (non-past)

  V (past)

  Standard

  見　ている

  見　ていた

  Kansai-ben

  見　と　る

  見　とった'
kansai_vs_standard: 'Standard

  Vている

  Kansai-ben

  Vてる

  Vとる'
