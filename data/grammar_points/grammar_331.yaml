  <em>ていた</em></td></tr><tr><th>Kansai-ben</th><td>見 <em>て る</em></td><td>見 <em>て た</em></td></tr></table><h2>Vとる</h2><table
  class="full-grid-table"><tr><th></th><th>V<sup class="lexicon-indicator" title="Abbreviation for verb.
  "><a class="lexicon-term" href="/taxonomy/term/155/" title="Abbreviation for verb. ">?</a></sup> (non-past)
  </th><th>V (past) </th></tr><tr><th>Standard</th><td>見 <em>ている</em></td><td>見 <em>ていた</em></td></tr><tr><th>Kansai-ben</th><td>見
  <em>と る</em></td><td>見 <em>とった</em></td></tr></table>
