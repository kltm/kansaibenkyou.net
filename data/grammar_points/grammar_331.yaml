title: Vてる／Vとる
body: 'The standard progressive, conditional, or stative Vている may become Vてる or Vとる in Kansai-ben.  Vてる
  obviously derives from Vている, while Vとる derives from Vておる. While originally the latter may have been
  considered more polite, it is now more about personal taste.

  It should be noted that in casual speech, even standard Japanese may drop the い form いる in the Vている
  form.'
commentary: <h2>Vとう in Kobe</h2><p>Vとう is more common than Vてる and Vとる in Kobe and its surrounding area.</p></div><h2>Vてる
  and Vとる as conditional and stative forms</h2><p>Like standard Japanese, Vてる and Vとる are not only used
  as progressive, but also conditional and stative forms</p><table><caption>Progressive</caption><tbody><tr><th>Standard</th><td>今、<em>宿題している</em>んだ。</td></tr><tr><th>Kansai-ben</th><td>今、<em>宿題してん</em>ねん。</td></tr><tr><th>English</th><td>I'm
  doing my home work right now.</td></tr></tbody></table><table><caption>Stative</caption><tbody><tr><th>Standard</th><td>あの人、<em>結婚している</em>の？</td></tr><tr><th>Kansai-ben</th><td>あの人、<em>結婚してん</em>の？</td></tr><tr><th>English</th><td>Are
  they married?</td></tr></tbody></table><table><caption>Conditional</caption><tbody><tr><th>Standard</th><td>この部屋、クーラー<em>ついている</em>？</td></tr><tr><th>Kansai-ben</th><td>この部屋、クーラー<em>ついてる</em>？</td></tr><tr><th>English</th><td>Is
  the air conditioner on in here?</td></tr></tbody></table></div><h2>ている form of いる = いてる</h2><p>While
  there is no Vている form of いる in standard Japanese, there is in Kansai-ben--いてる and いとる. There is no such
  parallel for ある.</p><table><caption>いてる</caption><tbody><tr><th>Standard</th><td>今日はずっと家に<em>いる</em>よ。</td></tr><tr><th>Kansai-ben</th><td>今日はずっと家に<em>いてる</em>よ。</td></tr><tr><th>English</th><td>I'll
  be staying home all day today.</td></tr></tbody></table>
example: '<table><caption>Vてる</caption><tbody><tr><th>Standard</th><td>A: 何<em>して(い)る</em>の？<br /> B:
  めがねを<em>探している</em>んだ。</td></tr><tr><th>Kansai-ben</th><td>A: 何<em>してる</em>ん？<br /> B: めがね、<em>探してん</em>ねん*。</td></tr><tr><th>English</th><td>A:
  What are you doing?<br /> B: I''m looking for my glasses.</td></tr></tbody></table><p>* When Vてる and
  Vとる are used with sentence endings, the final る may become ん.</p></div><table><caption>Vとる</caption><tbody><tr><th>Standard</th><td>あの人、ずっとこっちを<em>見ている</em>よ。気持ち悪いねえ。</td></tr><tr><th>Kansai-ben</th><td>あの人、ずっとこっち<em>見とる</em>で。気持ち悪いなあ。</td></tr><tr><th>English</th><td>That
  person has been staring at us the whole time. It''s unnerving. </td></tr></tbody></table>'
formation: <h2>Vてる</h2><table><tr><td>V (te-form) +る</td></tr></table></div><h2>Vとる</h2><table><tr><td>V
  (like the te-form, but use と instead of the final て) +る</td></tr></table>
formation_from_standard: <h2>Vてる</h2><table class="full-grid-table"><tr><th></th><th>V (non-past ) </th><th>V
  (past) </th></tr><tr><th>Standard</th><td>見 <em>ている</em></td><td>見 <em>ていた</em></td></tr><tr><th>Kansai-ben</th><td>見
  <em>て る</em></td><td>見 <em>て た</em></td></tr></table></div><h2>Vとる</h2><table class="full-grid-table"><tr><th></th><th>V
  (non-past) </th><th>V (past) </th></tr><tr><th>Standard</th><td>見 <em>ている</em></td><td>見 <em>ていた</em></td></tr><tr><th>Kansai-ben</th><td>見
  <em>と る</em></td><td>見 <em>とった</em></td></tr></table>
kansai_vs_standard: <table><tr><th>Standard</th><td><em>Vている</em></td></tr><tr><th>Kansai-ben</th><td><em>Vてる<br
  /> Vとる</em></td></tr><tr></tr></table>
