title: Vてる／Vとる
title_romaji: Vteru/Vtoru
body: <p>The standard progressive, conditional, or stative Vている may become Vてる or Vとる in Kansai-ben. Vてる
  obviously derives from Vている, while Vとる derives from Vておる. While originally the latter may have been
  considered more polite, it is now more about personal taste.</p><p>It should be noted that in casual
  speech, even standard Japanese may drop the い form いる in the Vている form.</p>
commentary: <h2>Vとう in Kobe</h2><p>Vとう is more common than Vてる and Vとる in Kobe and its surrounding area.</p><h2>Vてる
  and Vとる as conditional and stative forms</h2><p>Like standard Japanese, Vてる and Vとる are not only used
  as progressive, but also conditional and stative forms</p><table><caption>Progressive</caption><tbody><tr><th>Standard</th><td>今、<em>宿題している</em>んだ。</td></tr><tr><th>Kansai-ben</th><td>今、<em>宿題してん</em>ねん。</td></tr><tr><th>English</th><td>I'm
  doing my home work right now.</td></tr></tbody></table><table><caption>Stative</caption><tbody><tr><th>Standard</th><td>あの人、<em>結婚している</em>の？</td></tr><tr><th>Kansai-ben</th><td>あの人、<em>結婚してん</em>の？</td></tr><tr><th>English</th><td>Are
  they married?</td></tr></tbody></table><table><caption>Conditional</caption><tbody><tr><th>Standard</th><td>この部屋、クーラー<em>ついている</em>？</td></tr><tr><th>Kansai-ben</th><td>この部屋、クーラー<em>ついてる</em>？</td></tr><tr><th>English</th><td>Is
  the air conditioner on in here?</td></tr></tbody></table><h2>ている form of いる = いてる</h2><p>While there
  is no Vている form of いる in standard Japanese, there is in Kansai-ben--いてる and いとる. There is no such parallel
  for ある.</p><table><caption>いてる</caption><tbody><tr><th>Standard</th><td>今日はずっと家に<em>いる</em>よ。</td></tr><tr><th>Kansai-ben</th><td>今日はずっと家に<em>いてる</em>よ。</td></tr><tr><th>English</th><td>I'll
  be staying home all day today.</td></tr></tbody></table>
example: '<table><caption>Vてる</caption><tbody><tr><th>Standard</th><td>A: 何<em>して(い)る</em>の？<br/> B: めがねを<em>探している</em>んだ。</td></tr><tr><th>Kansai-ben</th><td>A:
  何<em>してる</em>ん？<br/> B: めがね、<em>探してん</em>ねん*。</td></tr><tr><th>English</th><td>A: What are you doing?<br/>
  B: I''m looking for my glasses.</td></tr></tbody></table><p>* When Vてる and Vとる are used with sentence
  endings, the final る may become ん.</p><table><caption>Vとる</caption><tbody><tr><th>Standard</th><td>あの人、ずっとこっちを<em>見ている</em>よ。気持ち悪いねえ。</td></tr><tr><th>Kansai-ben</th><td>あの人、ずっとこっち<em>見とる</em>で。気持ち悪いなあ。</td></tr><tr><th>English</th><td>That
  person has been staring at us the whole time. It''s unnerving. </td></tr></tbody></table>'
formation: '<h2>Vてる</h2><table><tr><td>V<sup class="lexicon-indicator" title="Abbreviation for verb. "><a
  class="lexicon-term" href="/taxonomy/term/155/" title="Abbreviation for verb. ">?</a></sup> (te-form<sup
  class="lexicon-indicator" title="For example: 食べて, 行って, して, and 来て."><a class="lexicon-term" href="/taxonomy/term/171/"
  title="For example: 食べて, 行って, して, and 来て.">?</a></sup>) +る</td></tr></table><h2>Vとる</h2><table><tr><td>V<sup
  class="lexicon-indicator" title="Abbreviation for verb. "><a class="lexicon-term" href="/taxonomy/term/155/"
  title="Abbreviation for verb. ">?</a></sup> (like the te-form<sup class="lexicon-indicator" title="For
  example: 食べて, 行って, して, and 来て."><a class="lexicon-term" href="/taxonomy/term/171/" title="For example:
  食べて, 行って, して, and 来て.">?</a></sup>, but use と instead of the final て) +る</td></tr></table>'
formation_from_standard: <h2>Vてる</h2><table class="full-grid-table"><tr><th></th><th>V<sup class="lexicon-indicator"
  title="Abbreviation for verb. "><a class="lexicon-term" href="/taxonomy/term/155/" title="Abbreviation
