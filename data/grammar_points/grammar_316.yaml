title: ほんで／ほいで
body: 'The standard conjunctive particle for connecting a reason and a consequence, それで, may become ほんで
  in Kansai-ben.

  In some regions, especially with older people, use ほいで instead.'
example: <table><caption>ほんで</caption><tbody><tr><th>Standard</th><td>昨日すごくビール飲んだんだ。<em>それで</em>、今日は二日酔いなんだ。</td></tr><tr><th>Kansai-ben</th><td>昨日めっちゃビール飲んでん。<em>ほんで</em>、今日は二日酔いやねん。</td></tr><tr><th>English</th><td>I
  had too much beer yesterday. That's why I have a hangover today.</td></tr></tbody></table>
kansai_vs_standard: <table><tr><th>Standard</th><td><em>(reason)。それで (consequence)。</em></td></tr><tr><th>Kansai-ben</th><td><em>(reason)。ほんで
  (consequence)。</em></td></tr><tr></tr></table>
