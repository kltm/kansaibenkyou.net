id: grammar_296
drupal_node_id: 296
title: Vへん／Vん
body: 'The Vへん verb ending may be the single most distinctive and recognizable piece of grammar in Kansai-ben.
  It is the plain non-past negative verb conjugation, analogous to Vない in standard Japanese. In addition,
  there is also a shortened form: Vん. Thus, standard Japanese''s 行かない could be rendered as 行かへん or 行かん
  in Kansai-ben.

  There are a variety of verb negations within the umbrella of Kansai-ben that use these two basic verb
  negations as a base, with variations depending on region or speaker preference.'
commentary: '<h3>Verb negation in Osaka</h3><p>In the Osaka area, vowel assimilation may occur in the
  negative form of verbs. When this happens, the [a] sound before the へん in V へん becomes an [e] sound.
  This sounds complicated, but isn''t too bad if you pay attention to the sounds:</p><table><tr><th>Kansai-ben</th><td></td><th>Kansai-ben
  (Osaka)</th></tr><tr><td>__-<em>a</em>-hen</td><td>→</td><td>__-<em>e</em>-hen</td></tr></table><table><tr><th>Kansai-ben</th><td></td><th>Kansai-ben
  (Osaka)</th></tr><tr><td>行<em>か</em>へん (ik-<em>a</em>-hen)</td><td>→</td><td>行<em>け</em>へん (ik-<em>e</em>-hen)</td></tr></table><p>As
  you may notice, as a result of this sound change, simple negative verbs and negative potential verbs
  can become difficult to distinguish. Because of this, when the verb is being used in a potential sense,
  an [e] is used instead of the [are]. For example:</p><table><tr><th>Kansai-ben</th><td></td><th>Kansai-ben
  (Osaka)</th></tr><tr><td>__-<em>e</em>-hen</td><td>→</td><td>__-<em>are</em>-hen</td></tr></table><table><tr><th>Kansai-ben</th><td></td><th>Kansai-ben
  (Osaka)</th></tr><tr><td>行<em>け</em>へん (ik-<em>e</em>-hen)</td><td>→</td><td>行<em>かれ</em>へん (ik-<em>are</em>-hen)</td></tr></table></div><h3>The
  negative form of verbs and vowel assimilation</h3><p>For ru-verbs which have a stem the ends with [i],
  vowel assimilation can occur. In the case, the Kansai-ben "standard" へん becomes ひん. A couple of examples
  (with romaji for clarity):</p><table><tr><td>__<em>i</em>-h<em>e</em>n</td><td>→</td><td>__<em>i</em>-h<em>i</em>n</td></tr></table><table><tr><td>起き<em>へん</em>
  (ok<em>i</em>-h<em>e</em>n)</td><td>→</td><td>起き<em>ひん</em> (ok<em>i</em>-h<em>i</em>n)</td></tr></table><p>Also,
  if the stem ends with an [i], it changes into an [e]:</p><table><tr><td>__<em>i</em>-hen</td><td>→</td><td>__<em>e</em>-hen</td></tr></table><table><tr><td>起<em>き</em>へん
  (ok<em>i</em>-hen)</td><td>→</td><td>起<em>け</em>へん (ok<em>e</em>-hen)</td></tr></table><p>Using the
  different transformations described, a standard Japanese verb can end up having a fair number Kansai-ben
  analogs. For example, the standard Japanese 起きない can variously become: 起きへん, 起きひん, 起けへん, and 起きん.</p></div><h3>The
  negative form of verbs and vowel extension</h3><p>For ru-verbs with one character in their stem, the
  sound before へん and ひん can be extended. For a more detailed description see the <a href="351">vowel
  extension</a> page, but as an example with out Kansai-ben-style negative non-past verbs we have:</p><table><tr><td>見ない
  (minai)</td><td>→</td><td>見<em>い</em>へん (mi<em>i</em>-hen)、見<em>い</em>ひん (mi<em>i</em>-hin)</td></tr><tr><td>寝ない
  (nenai)</td><td>→</td><td>寝<em>え</em>へん (ne<em>e</em>-hen)</td></tr></table><p>Sometimes some speakers
  will take this a step farther; when there are double vowels in front of へん and ひん, the second "extended"
  vowel turns into a や, giving us:</p><table><tr><td>見<em>い</em>へん (m<em>ii</em>-hen)</td><td>→</td><td>見<em>や</em>へん
  (mi-<em>ya</em>-hen)</td></tr><tr><td>寝<em>え</em>へん (n<em>ee</em>-hen)</td><td>→</td><td>寝<em>や</em>へん
  (ne-<em>ya</em>-hen)</td></tr></table></div><h3>The negative form of いる</h3><p>Although there is no
  progressive form (teiru) of いる in standard Japanese, there is a such a form in Kansai-ben--see the <a
  href="331">いてる</a> for more detail. The negative of this form, which would be the fantastic いてる in standard
  Japanese, is いてへん.</p></div><h3>Negative form of ある</h3><p>The standard Japanese negative form of ある
  is ない; あらない is considered to be an inappropriate in standard Japanese--consider how most people respond
  to the use of "ain''t" in American English in spite of its wide use. However things are different in
  Kansai-ben, where あらへん and あれへん happily exist as negative forms of ある, heedless to prescriptions of
  standard Japanese.</p></div><h3>Progressive form</h3><p>The negative progressive form <a href="331">Vている</a>
  is quite varied. Besides Vてへん, for example, there are Vてない (standard/neo-dialect), Vとらん (Kobe), and
  Vとらへん (Osaka).</p><table><tr><td>言っていない</td><td>→</td><td>ゆうてへん、ゆうてない、ゆうとらん、ゆうとらへん</td></tr></table></div><h3>Applied
  verb negatives</h3><table class="full-grid-table"><tr><th>Standard</th><th>English</th><th>Kansai-ben
  (Vん)</th><th>Kansai-ben (Vな)</th><th>Kansai-ben (Vへん)</th><th>Example</th></tr><tr><th>Vなければならない<br
  /> Vなくてはいけない</th><td>must / have to</td><td><a href="323">Vんとあかん</a></td><td><a href="323">Vなあかん</a></td><td></td><td><span
  class="nowrap">食べんとあかん</span><br /> 食べなあかん</td></tr><tr><th>Vないで(ください)</th><td>don''t</td><td><a href="333">Vんといて(くれ／ください)</a></td><td></td><td></td><td><a
  href="333"></a>食べんといて(くれ／ください)</td></tr><tr><th>Vなくてもいい</th><td>don''t have to</td><td><a href="325">Vでもええ</a></td><td></td><td></td><td>食べんでもええ</td></tr><tr><th>Vないでしょう</th><td>maybe
  not</td><td><a href="330">Vんやろ</a></td><td></td><td><a href="330">Vへんやろ</a></td><td>食べんやろ<br /> 食べへんやろ</td></tr><tr><th><span
  class="nowrap">Vないかもしれない</span></th><td>might not</td><td>Vんかもしれん</td><td></td><td>Vへんかもしれへん</td><td>食べんかもしれん<br
  /> 食べへんかもしれ(へ)ん</td></tr><tr><th>Vないはずだ</th><td><span class="nowrap">not supposed to</span></td><td>Vんはずや</td><td></td><td>Vへんはずや</td><td>食べんはずや<br
  /> 食べへんはずや</td></tr><tr><th>V1ないでV2</th><td>V2 without V1</td><td><a href="329">V1んとV2</a></td><td></td><td></td><td>食べんと寝る</td></tr></table>'
formation: <h3>non-past tense</h3><h4>u-verb<br /><h4></h4></h4><p>Use へん or ん instead of ない.</p><table><tr><th>Standard</th><td>V<em>ない</em></td></tr><tr><th>Kansai-ben</th><td>V<em>へん</em><br
  /> V<em>ん</em></td></tr></table><table><tr><td>行か<em>ない</em></td><td>→</td><td>行か<em>へん</em>, 行か<em>ん</em></td></tr><tr><td>読ま<em>ない</em></td><td>→</td><td>読ま<em>へん</em>,
  読ま<em>ん</em></td></tr></table><h4>ru-verb</h4><p> Add へん or ん to the stem.</p><table><tr><th>Standard</th><td>V<em>ない</em></td></tr><tr><th>Kansai-ben</th><td>V<em>へん</em><br
  /> V<em>ん</em></td></tr></table><table><tr><td>食べ<em>ない</em></td><td>→</td><td>食べ<em>へん</em>, 食べ<em>ん</em></td></tr><tr><td>起き<em>ない</em></td><td>→</td><td>起き<em>へん</em>,
  起き<em>ん</em></td></tr></table><h4>irregular verb 来る</h4><p>There are many of different negative forms
  of 来る depending on many factors, such as region and age. Young people may use こおへん, which is a "neo-dialect",
  a hybrid of standard Japanese and Kansai-ben.</p><table><tr><td>来ない</td><td>→</td><td>けえへん, きいひん, きやへん,
  こん, こおへん, こうへん, きやしん, etc.</td></tr><tr></tr></table><h4>irregular verb する</h4><p>Like 来る, there is
  a wide variety in the negative forms of する.</p><table><tr><td>しない</td><td>→</td><td>しいひん, しやへん, せえへん,
  せえひん, せん, etc.</td></tr><tr></tr></table></div><h3>Past tense</h3><p>Just add かった to the non-past negative
  forms such as Vへん, Vん, and Vひん.</p><table><tr><th>non-past</th><td>Vへん<em>__</em></td><td>Vん<em>__</em></td><td>Vひん<em>__</em></td></tr><tr><th>past</th><td>Vへん<em>かった</em></td><td>Vん<em>かった</em></td><td>Vひん<em>かった</em></td></tr></table><h4>Vなんだ</h4><p>Another
  way of making a negative past form in Kansai-ben is to use なんだ instead of なかった. Simply:</p><table><tr><td>起きなかった</td><td>→</td><td>起きなんだ</td></tr><tr><td>買わなかった</td><td>→</td><td>買わなんだ</td></tr></table><p>However,
  this is a "traditional" way used by older people--there are more people who use Vへんかった or the standard
  Japanese form (e.g., 起きなかった), but with a Kansai-ben intonation.</p>
