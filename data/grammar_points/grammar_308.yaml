title: Particles “か”and “け” feeling
body: 'In Kansai-ben, when the question particles か and け are added to the end of a sentence, whereas
  they are often dropped in casual speech in

  standard Japanese. It should be additionally noted that they are pronounced with  a rising intonation.'
commentary: <h2>Reminding with かい</h2><p>かい can be used as a questioning reminder.</p><table><tr><th></th><td>もう宿題したの？</td></tr><tr><th>Kansai-ben</th><td>もう宿題したんかい。</td></tr><tr><th>English</th><td>Did
  you already finish your homework?</td></tr></table><p>The further addition of a な, giving <a href="310">かいな</a>
  can add an additional feeling of surprise, confusion, anger, or others. See the <a href="310">かいな</a>
  page for more details.</p>
example: <table><caption>＿＿か。</caption><tbody><tr><th>Standard</th><td>ケーキ、あと一つあるんだけど、食べない<em>？</em></td></tr><tr><th>Kansai-ben</th><td>ケーキ、あと一つあんねんけど、食べへん<em>か</em>。</td></tr><tr><th>English</th><td>There
  is only one piece of cake left, would you like it?</td></tr></tbody></table>
kansai_vs_standard: <table><tr><th>Standard</th><td><em>＿＿＿？(↑)<em></em></em></td></tr><tr><th>Kansai-ben</th><td><em>＿＿＿？(↑)<br
  /> ＿＿＿か<br /> ＿＿＿け*</em></td></tr><tr></tr></table><p>*The question particle け is most commonly used
  some parts of Kawachi (an eastern part of Osaka) and Wakayama.</p>
