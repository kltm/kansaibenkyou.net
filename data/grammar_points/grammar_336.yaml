id: grammar_336
drupal_node_id: 336
title: Vよ
title_romaji: Vyo
body: '<p>In Kansai-ben, the final う sound of the volitional form<sup class="lexicon-indicator" title="For
  example: 行こう in standard Japanese and 行こ in Kansai-ben. "><a class="lexicon-term" href="/taxonomy/term/174/"
  title="For example: 行こう in standard Japanese and 行こ in Kansai-ben. ">?</a></sup> is often omitted (<a
  href="/phonology/350/">Dropping "う"</a>), so the volitional form may become V<sup class="lexicon-indicator"
  title="Abbreviation for verb. "><a class="lexicon-term" href="/taxonomy/term/155/" title="Abbreviation
  for verb. ">?</a></sup>(よ).</p>'
example: <table><tr><th>Standard</th><td>明日、学校<em>休もう</em>と思っているんだ。</td></tr><tr><th>Kansai-ben</th><td>明日、学校<em>休も</em>思てるねん。</td></tr><tr><th>English</th><td>I'm
  thinking about not going to school tomorrow.</td></tr></table>
formation_from_standard: '<table class="full-grid-table"><tr><th></th><th>食べる (ru-verb<sup class="lexicon-indicator"
  title="Verbs that ends with る but are not u-verbs (such as 走る and 帰る) or irregular verbs. Also known
  as Ichidan or Group 2 verbs. For example: 食べる, 寝る, and 着る."><a class="lexicon-term" href="/taxonomy/term/160/"
  title="Verbs that ends with る but are not u-verbs (such as 走る and 帰る) or irregular verbs. Also known
  as Ichidan or Group 2 verbs. For example: 食べる, 寝る, and 着る.">?</a></sup>)</th><th>行く<br/> (u-verb<sup
  class="lexicon-indicator" title="Any verb besides a ru-verb or an irregular verb. Also known as a Yodan
  or Group 1 verb. For example: 行く, 書く, and 読む."><a class="lexicon-term" href="/taxonomy/term/154/" title="Any
  verb besides a ru-verb or an irregular verb. Also known as a Yodan or Group 1 verb. For example: 行く,
  書く, and 読む.">?</a></sup>)</th><th>くる<br/><span class="nowrap">(irregular verb<sup class="lexicon-indicator"
  title="Suru-verbs (e.g., する, 勉強する) and 来る."><a class="lexicon-term" href="/taxonomy/term/161/" title="Suru-verbs
  (e.g., する, 勉強する) and 来る.">?</a></sup>)</span></th><th>する<br/><span class="nowrap">(irregular verb)</span></th></tr><tr><th>Standard</th><td>食べよ<em>う</em></td><td>行こ<em>う</em></td><td>こよ<em>う</em></td><td>しよ<em>う</em></td></tr><tr><th>Kansai-ben</th><td>食べよ<em>＿</em></td><td>行こ<em>＿</em></td><td>こよ<em>＿</em></td><td>しよ<em>＿</em></td></tr></table>'
kansai_vs_standard: <table><tr><th>Standard</th><td><em>V<sup class="lexicon-indicator" title="Abbreviation
  for verb. "><a class="lexicon-term" href="/taxonomy/term/155/" title="Abbreviation for verb. ">?</a></sup>(よ)う</em></td></tr><tr><th>Kansai-ben</th><td><em>V(よ)</em></td></tr></table>
