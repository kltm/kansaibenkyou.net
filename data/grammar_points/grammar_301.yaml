id: grammar_301
drupal_node_id: 301
title: Te-form and ta-form (verbs)
body: 'Looking from standard Japanese to Kansai-ben, there are some differences in the final vowels of
  the te-form? and ta-form? when the verb ends with [au], [ou], or [uu] sounds.

  The first case is for verbs where the dictionary form? is just two characters (かう, すう, etc.). In this
  case the sound before the う extends (vowel extension).

  The second case is for the other verbs. In this case the sound before the う can extend (vowel extension),
  but not necessarily.'
