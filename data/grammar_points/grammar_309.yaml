id: grammar_309
drupal_node_id: 309
title: ねん／てん／ん／のん／たん
title_romaji: nen/ten/n/non/tan
body: '<p>In Kansai-ben, ねん, てん, ん, のん, and たん are used in queries, asking for reasons, and giving explanations.</p><p>The
  standard sentence endings のだ and んだ may become ねん and てん in Kansai-ben. The main difference between
  the two is that while ねん is mainly used in the non-past tense, てん is always used in the past tense.</p><p>Similarly,
  the standard sentence ending の may become ん, のん, or たん in Kansai-ben. It should be noted that ん and
  のん have essentially the same meaning, with the difference decided by region or speaker preference. Again,
  similar to the above, while ん and のん are used in the non-past tense, たん is only used in the past-tense
  (the た in たん is considered to be a part in ta-form<sup class="lexicon-indicator" title="The short past
  tense form. For example: 食べた, 行った, した, and 来た."><a class="lexicon-term" href="/taxonomy/term/170/" title="The
  short past tense form. For example: 食べた, 行った, した, and 来た.">?</a></sup> of the verbs, adjectives, and
  nouns that comes in front of たん).</p><p>It should be highlighted that just like their counterparts in
  standard Japanese, ねん and てん are used to express a more emphatic feeling than ん, のん, and たん. </p><p>It
  should also be noted that the てん mentioned here is not related to the <a href="/phonology/351/">てる／てん</a>
  of verb conjugation.</p>'
commentary: <h2>Past tense + ねん</h2><p>ねん can also used with the past tense. In that case, just add ねん
  to the past tense of words.</p><table><caption>＿＿ねん (past)</caption><tbody><tr><th>Standard</th><td>昨日、テストあった<em>んだ</em>。</td></tr><tr><th>Kansai-ben</th><td>昨日、テストあった<em>ねん</em>。</td></tr><tr><th>English</th><td>We
  had a quiz yesterday.</td></tr></tbody></table><h2>When to use ねん, てん, ん, のん, and たん</h2><table class="full-grid-table"><tr><th></th><th>WH
  - question</th><th>Yes/No question</th><th>Response sentence</th></tr><tr><th>＿＿ねん</th><td>どこ行く<em>ねん</em>？</td><td>×</td><td>コンビニ行く<em>ねん</em>。</td></tr><tr><th>＿＿てん</th><td>いつ、大阪来<em>てん</em>？</td><td>×</td><td>昨日、大阪来<em>てん</em>。</td></tr><tr><th>＿＿ん</th><td>だれ、来る<em>ん</em>？</td><td>田中も来る<em>ん</em>？</td><td>田中も来る<em>ん</em><em>や</em>。*</td></tr><tr><th>＿＿のん</th><td>何、食べてん<em>のん</em>？</td><td>まだ、食べてん<em>のん</em>？</td><td>×</td></tr><tr><th>＿＿たん</th><td>どこ、行っ<em>たん</em>？</td><td>学校へ行っ<em>たん</em>？</td><td>学校へ行っ<em>たん</em><em>や</em>。*</td></tr></table><p>×
  should not be used<br/> * can only be used with final particles such as <a href="/grammar-points/306/">や</a>.</p>
example: <table><caption>＿＿ねん (non-past)</caption><tbody><tr><th>Standard</th><td>明日、テストある<em>んだ</em>。</td></tr><tr><th>Kansai-ben</th><td>明日、テストある<em>ねん</em>。</td></tr><tr><th>English</th><td>We'll
  have a quiz tomorrow.</td></tr></tbody></table><table><caption>＿＿てん (past)</caption><tbody><tr><th>Standard</th><td>昨日の晩ご飯、カレーだっ<em>たんだ</em>。</td></tr><tr><th>Kansai-ben</th><td>昨日の晩ご飯、カレーやっ<em>てん</em>。</td></tr><tr><th>English</th><td>We
  had curry for dinner last night.</td></tr></tbody></table><table><caption>＿＿ん</caption><tbody><tr><th>Standard</th><td>どうする<em>の</em>？</td></tr><tr><th>Kansai-ben</th><td>どうする<em>ん</em>？</td></tr><tr><th>English</th><td>What
  are you going to do?</td></tr></tbody></table><table><caption>＿＿のん</caption><tbody><tr><th>Standard</th><td>どこ行く<em>の</em>？</td></tr><tr><th>Kansai-ben</th><td>どこ行く<em>のん</em>？</td></tr><tr><th>English</th><td>Where
  are you going?</td></tr></tbody></table><table><caption>＿＿たん</caption><tbody><tr><th>Standard</th><td>昨日、学校行っ<em>たの</em>？</td></tr><tr><th>Kansai-ben</th><td>昨日、学校行っ<em>たん</em>？</td></tr><tr><th>English</th><td>Did
  you go to school yesterday?</td></tr></tbody></table>
