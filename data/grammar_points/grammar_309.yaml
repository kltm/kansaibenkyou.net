  ta-form?+ん

  na-Adj? and N?

  stem?+やった+ん'
formation_from_standard: '＿＿ねん

  verbs that end with る*

  verbs that do not end with る

  (including the past tense of verbs that end with る)

  i-Adj?

  na-Adj?

  N?

  Standard

  帰る　のだ

  帰る　んだ

  行く　のだ

  行く　んだ

  大きい　のだ

  大きい　んだ

  しずかな　のだ

  しずかな　んだ

  学生な　のだ

  学生な　んだ

  Kansai-ben

  帰ん　ねん

  帰る　ねん

  行く　ねん

  大きい　ねん

  しずかや　ねん

  学生や　ねん

  *These are not only ru-verbs but also u-verbs end with る. (Example: 帰る、取る)

  ＿＿てん

  V? (ta-form?)

  i-Adj? (ta-form)

  na-Adj? (ta-form)

  N? (ta-form)

  Standard

  行った　のだ

  行った　んだ

  大きかった　のだ

  大きかった　んだ

  しずかだった　のだ

  しずかだった　んだ

  学生だった　のだ

  学生だった　んだ

  Kansai-ben

  行って　ん

  大きかって　ん

  しずかやって　ん

  学生やって　ん

  ＿＿ん

  V? (ta-form?)

  i-Adj? (ta-form)

  na-Adj? (ta-form)

  N? (ta-form)

  Standard

  行く　の

  大きい　の

  しずかな　の

  学生な　の

  Kansai-ben

  行く　ん

  大きい　ん

  しずかな*　ん

  学生な　ん

  *with a na-Adj.+の, the な part can become や. (Example: しずかやの)

  ＿＿のん

  verbs that end with る*

  verbs that do not end with る

  (including the past tense of verbs that end with る)

  i-Adj?

  na-Adj?

  N?

  Standard

  帰る　の

  行く　の

  大きい　の

  しずかな　の

  学生な　の

  Kansai-ben

  帰ん　のん

  帰る　のん

  行く　のん

  大きい　のん

  しずかや　のん

  学生や　のん

  *These are not only ru-verbs but also u-verbs end with る. (Example: 帰る、取る)

  ＿＿たん

  V? (ta-form?)

  i-Adj? (ta-form)

  na-Adj? (ta-form)

  N? (ta-form)

  Standard

  行った　の

  大きかった　の

  しずかだった　の

  学生だった　の

  Kansai-ben

  行った　ん

  大きかった　ん

  しずかやった　ん

  学生やった　ん'
