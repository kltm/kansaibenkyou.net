id: grammar_312
drupal_node_id: 312
title: Prefix “ど”
body: 'Prefix? ど can emphasize the meaning of the word, and it is more common in Kansai.

  One should be warned that this prefix has a certain rude/older man feel to it and should only be used
  if one knows what they''re doing.'
commentary: <h2>The characteristics of ど I</h2><p>In general, ど is used with negative words, not positive
  words (such as きれい).<br /> However, there are some exceptions. For example, えらい (in the sense of "very")
  can take ど.</p><table><caption>どえらい</caption><tbody><tr><th>Standard</th><td>あの子<em>ものすごく</em>かわいいなあ。</td></tr><tr><th>Kansai-ben</th><td>あの子<em>どえらい</em>かえらしなあ。</td></tr><tr><th>English</th><td>That
  girl is really cute.</td></tr></tbody></table></div><h2>The characteristics of ど II</h2><p>ど is often
  used in abusive language.</p><table><caption>どたま</caption><tbody><tr><th>Standard</th><td>こら、この<em>スケベ野郎</em>！何オレの女をジロジロ見てんだよ！<br
  /><em>頭</em>をぶんなぐってやるぞ！</td></tr><tr><th>Kansai-ben</th><td>ワレ、この<em>どスケベ</em>が。何ワシの女ジロジロ見とんねん！<br /><em>どたま</em>かち割ったろか！</td></tr><tr><th>English</th><td>Hey,
  you perv! Quit staring at my girl. I'm gunna hafta smack you upside the head.</td></tr></tbody><table></table></table></div><h2>The
  characteristics of ど III</h2><p>The ど-prefixed words which have a neutral meaning, such as ど根性, ど真ん中,
  and ど迫力, are commonly used even outside of Kansai.</p>
example: <table class="full-grid-table"><tr><th>Standard</th><th>Kansai-ben</th><th>English</th></tr><tr><td>頭(あたま)</td><td><em>ど</em>たま</td><td>head</td></tr><tr><td>あほ</td><td><em>ど</em>あほ</td><td>idiot</td></tr><tr><td>えらい(すごく)</td><td><em>ど</em>えらい</td><td>very</td></tr><tr><td>きたない</td><td><em>ど</em>ぎたない</td><td>dirty</td></tr><tr><td>根性(こんじょう)</td><td><em>ど</em>根性(<em>ど</em>こんじょう)</td><td>moxie/guts</td></tr><tr><td>すけべ</td><td><em>ど</em>すけべ</td><td>dirty/creepy</td></tr><tr><td>迫力(はくりょく)</td><td><em>ど</em>迫力(<em>ど</em>はくりょく)</td><td>power;
  oomph</td></tr><tr><td>ぶす</td><td><em>ど</em>ぶす</td><td>ugly</td></tr><tr><td>真ん中(まんなか)</td><td><em>ど</em>真ん中(<em>ど</em>まんなか)</td><td>center;
  bull's eye</td></tr></table></div><table><caption>Example with どえらい</caption><tbody><tr><th>Standard</th><td>今日は<em>ものすごい</em>雨だなあ。仕事行くのいやだなあ。</td></tr><tr><th>Kansai-ben</th><td>今日は<em>どえらい</em>雨やなあ。仕事行くんいややなあ。</td></tr><tr><th>English</th><td>Geez,
  it's raining so much today. I don't wanna go to work.</td></tr></tbody></table>
