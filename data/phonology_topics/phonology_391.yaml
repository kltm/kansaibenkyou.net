title: Greetings
body: 'Standard

  Kansai-ben

  おはよう

  [↓]

  おはよう

  [↓]

  おはようございます

  [↓]

  おはようございます

  [↓]

  こんにちは

  [↓]

  こんにちは

  [↓]

  こんばんは

  [↓]

  こんばんは

  [↓]

  さようなら

  [↓]

  さよなら1

  [↓]

  はじめまして

  [↓]

  はじめまして 2

  [↓]

  どうぞよろしく

  [↓]

  どうぞよろしく

  [↓]

  しつれいします

  [↓]

  しつれいします

  [↓]

  おじゃまします

  [↓]

  おじゃまします

  [↓]

  いってきます

  [↓]

  いってきます

  [↓]

  いってらっしゃい

  [↓]

  いってらっしゃい

  [↓]

  ただいま

  [↓]

  ただいま

  [↓]

  おかえり

  [↓]

  おかえり

  [↓]

  おかえりなさい

  [↓]

  おかえりなさい

  [↓]

  いただきます

  [↓]

  いただきます

  [↓]

  ごちそうさま

  [↓]

  ごちそうさま

  [↓]

  ごちそうさまでした

  [↓]

  ごちそうさまでした3

  [↓]

  おやすみ

  [↓]

  おやすみ

  [↓]

  おやすみなさい

  [↓]

  おやすみなさい

  [↓]

  1. さいなら is also used.

  2. おはつにお目にかかります is often used as well.

  3. ごちそうさんでした and ごっつぉーさん are often used as well.'
