title: Vowels
body: '<p><img class="left-image" src="/assets/images/wiki-danjiri-matsuri_160.jpg"/></p><p>There are
  five vowels in Kansai-ben: あ, い, う, え, and お--the same as standard Japanese. According to Yamashita
  (2004) <a class="see-footnote" href="/phonology/340/#footnote1_wapdsk6" id="footnoteref1_wapdsk6" title="Yamashita,
  Y. (2004) Kansai-ben Koogi, Tokyo: Kodansha">1</a>, Kansai-ben is an easy to understand dialect for
  Japanese learners because people tend to pronounce vowels more clearly.</p><p>To take a single case,
  unlike standard Japanese where [i] and [u] sound are often devoiced, devoicing<sup class="lexicon-indicator"
  title=''When a voiced sound becomes voiceless. For example: the word です ("desu") is pronounced as "des"
  in standard Japanese. ''><a class="lexicon-term" href="/taxonomy/term/184/" title=''When a voiced sound
  becomes voiceless. For example: the word です ("desu") is pronounced as "des" in standard Japanese. ''>?</a></sup>
  these vowels rarely occurs in Kansai-ben. For example, in standard Japanese 聞く is usually pronounced
  [k(i)ku], 行きますか [(i)kimasuka], and です [des(u)]. However, in Kansai-ben, people clearly pronounce these
  [i] and [u] sounds.</p><p>Another case is the pronunciation of う. In Kansai, people round their lips
  more than they do in standard Japanese. This has the effect of making the sound more clear.</p><p>Besides
  the above two examples, there are three broad characteristics of Kansai-ben vowels: <a href="/phonology/352/">palatalization</a>,
  <a href="/phonology/351/">vowel extension</a>, and the <a href="/phonology/350/">dropping of "う"</a>.</p><ul
  class="footnotes"><li class="footnote" id="footnote1_wapdsk6"><a class="footnote-label" href="/phonology/340/#footnoteref1_wapdsk6">1.</a>
  Yamashita, Y. (2004) <i>Kansai-ben Koogi</i>, Tokyo: Kodansha</li></ul>'
