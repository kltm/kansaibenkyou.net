title: Vowel Extension
body: 'In words that consist of only one mora?, the vowels at the end tend to extend and become two mora.
  For example:

  Word

  Standard

  Kansai-ben

  [↓]

  [↓]

  胃

  stomach

  い

  いぃ

  絵

  picture

  え

  えぇ

  蚊

  mosquito

  か

  かぁ

  気

  mind

  き

  きぃ

  木

  tree

  き

  きぃ

  毛

  hair

  け

  けぇ

  四

  four

  し

  しぃ

  字

  letter

  じ

  じぃ

  背

  height

  せ

  せぇ

  血

  blood

  ち

  ちぃ

  手

  hand

  て

  てぇ

  戸

  door

  と

  とぉ

  二

  two

  に

  にぃ

  歯

  teeth

  は

  はぁ

  日

  sun

  ひ

  ひぃ

  目

  eye

  め

  めぇ

  Also, for verbs where the stem? consists of one mora, the end vowel sometimes extends depending on the
  conjugation.

  Word

  Imperative-form

  Negative form

  寝る

  to sleep

  ねぇ

  ねぇへん

  見る

  to watch

  みぃ

  みぃひん

  来る

  to come

  きぃ

  きぃひん

  けぇへん

  する

  to do

  しぃ

  しぃひん

  せぇへん'
