title: Intonation Differences between Common Phrases in Standard Japanese and Kansai-ben
body: <p>Listen to common phrases in both standard Japanese and Kansai-ben. Due to the large number of
  examples, we've broken them into the following five categories:</p><ul><li><a href="/phonology/391/">Greetings</a></li><li><a
  href="/phonology/392/">Gratitude</a></li><li><a href="/phonology/393/">Apologies</a></li><li><a href="/phonology/395/">Numbers</a></li><li><a
  href="/phonology/394/">Other</a></li></ul>
