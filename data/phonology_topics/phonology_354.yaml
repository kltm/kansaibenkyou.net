title: Intonation Differences between Common Phrases in Standard Japanese and Kansai-ben
body: 'Listen to common phrases in both standard Japanese and Kansai-ben. Due to the large number of examples,
  we''ve broken them into the following five categories:

  Greetings

  Gratitude

  Apologies

  Numbers

  Other'
