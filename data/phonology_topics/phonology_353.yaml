title: Accent Patterns
body: '<p><img class="left-image" src="/assets/images/wiki-america-mura_160.jpg"/></p><p>In Kansai-ben,
  there is more accent than there are in standard Japanese--accent is very important in Kansai-ben. While
  listening to the Kansai accent can be useful in understanding and producing it, it is important to understand
  the underlying characteristics that compose it. All words can be placed into one of four groups defined
  by two characteristics. </p><p>The first characteristic is the pitch<sup class="lexicon-indicator" title="The
  relative tone of a sound."><a class="lexicon-term" href="/taxonomy/term/182/" title="The relative tone
  of a sound.">?</a></sup> of the first mora<sup also="" and="" are="" as="" class="lexicon-indicator"
  counting="" example:="" for="" has="" hiragana="" like="" mora="" moras="" moras.="" one="" sounds=""
  things="" title="In Japanese, essentially all of the " two=""><a class="lexicon-term" href="/taxonomy/term/181/"
  title=''In Japanese, essentially all of the "hiragana sounds" are one mora (with things like しゃ, きょ,
  and ん also counting as one). For example: いぬ has two moras and かんさいべんきょう has 8 moras. ''>?</a></sup>.
  All words are classified into two groups: <a href="/phonology/388/">group H</a> where the first mora''s
  pitch is high and <a href="/phonology/389/">group L</a> where it''s low. </p><p>The second characteristic
  is called the downstep<sup class="lexicon-indicator" title="Where the pitch of a word starts to fall."><a
  class="lexicon-term" href="/taxonomy/term/183/" title="Where the pitch of a word starts to fall.">?</a></sup>.
  A downstep is where a high pitched mora''s sound starts to fall. A downstep can occur anywhere or not
  at all, but if the mora starts with a low pitch it cannot (naturally) occur there. Also, it''s rare
  for the downstep to occur in the final aremora of a longer word. In special mora--nasals (ん), long vowels
  (もう, etc.), and long consonants (the っ in 切った)--downsteps can occur in Kansai-ben, but don''t appear
  in standard Japanese. See <a href="/phonology/390/">"downstep examples"</a> for the examples.</p><p>After
  a downstep occurs in a word, no more high pitched mora will occur, the same as in standard Japanese.
  It''s good to note that one can discriminate between compound words versus separate words using this
  (e.g., cheese cake, cheesecake).</p><p>To practice listening for these characteristics, please see the
  intonation differences between standard Japanese and Kansai-ben in <a href="/phonology/354/">common
  phrases</a> and <a href="/phonology/360/">sentences</a>.</p>'
