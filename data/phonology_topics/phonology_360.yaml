id: phonology_360
drupal_node_id: 360
title: Intonation Differences between Standard Japanese and Kansai-ben. (sentences)
body: 'Even when we say exactly the same sentences in standard Japanese and Kansai-ben, there is still
  intonation difference. Listen to the sentences below in both standard Japanese and Kansai-ben. You should
  be able to hear the difference.

  Examples:

  ３時頃もどってくるから、ちょっと留守番してて。

  (Could you look after the house for a little while? I''ll be back around 3:00.)

  Standard

  [↓]

  Kansai-ben

  [↓]

  あ〜、財布、持って来るの忘れた。千円貸して。明日絶対返すから。

  (Oh! I forgot to bring my wallet. Could you lend me 1000yen? I''ll give it back tomorrow.)

  Standard

  [↓]

  Kansai-ben

  [↓]

  部長、二時ごろ、中山商事の森本さんから電話ありましたよ。

  (There was a phone call from Morimoto at Nakayama trading around 2:00.)

  ああ、そう。ありがとう。

  (Oh, I see. Thank you.)

  Standard

  [↓]

  Kansai-ben

  [↓]

  ごめん、まだ準備できてないから先に行ってて。

  (Sorry, I''m not ready yet. Please go ahead.)

  うん、分かった。

  (Okay.)

  Standard

  [↓]

  Kansai-ben

  [↓]

  お昼ごはん、どこで食べる？

  (Where should we eat lunch?)

  う〜ん、じゃあ、先週行ったカレーハウスは？

  (How about Curry House that we went last week?)

  ええ〜、また〜？

  (Again?)

  Standard

  [↓]

  Kansai-ben

  [↓]'
