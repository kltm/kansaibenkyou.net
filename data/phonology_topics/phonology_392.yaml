  class="kb-audio" id="audioplayer-24"><a href="/assets/audio/st_douitashi.mp3">[↓]</a></p></td><td>どういたしまして<a
  class="see-footnote" href="/phonology/392/#footnote2_h4fofwr" id="footnoteref2_h4fofwr" title="かまへん
  is more common.">2</a><br/><p class="kb-audio" id="audioplayer-62"><a href="/assets/audio/pho_kb_doitashi.mp3">[↓]</a></p></td></tr></tbody></table><ul
  class="footnotes"><li class="footnote" id="footnote1_lgwa8j0"><a class="footnote-label" href="/phonology/392/#footnoteref1_lgwa8j0">1.</a>
  おおきに is also used.</li><li class="footnote" id="footnote2_h4fofwr"><a class="footnote-label" href="/phonology/392/#footnoteref2_h4fofwr">2.</a>
  かまへん is more common.</li></ul>
