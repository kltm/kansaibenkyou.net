title: Gratitude
body: <table><tbody><tr><th>Standard</th><th>Kansai-ben</th></tr><tr><td>ありがとう<br/><p class="kb-audio"
  id="audioplayer-20"><a href="/assets/audio/st_arigatou.mp3">[↓]</a></p></td><td>ありがとう<a class="see-footnote"
