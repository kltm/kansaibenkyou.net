title: Gratitude
body: 'Standard

  Kansai-ben

  ありがとう

  [↓]

  ありがとう1

  [↓]

  ありがとうございます

  [↓]

  ありがとございます

  [↓]

  どうも

  [↓]

  どうも

  [↓]

  こちらこそ

  [↓]

  こちらこそ

  [↓]

  どういたしまして

  [↓]

  どういたしまして2

  [↓]

  1. おおきに is also used.

  2. かまへん is more common.'
