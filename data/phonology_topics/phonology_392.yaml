  class="kb-audio" id="audioplayer-58"><a href="/assets/audio/pho_kb_arigato.mp3">[↓]</a></p></td></tr><tr><td>ありがとうございます<br/><p
  class="kb-audio" id="audioplayer-21"><a href="/assets/audio/st_arigatogoza.mp3">[↓]</a></p></td><td>ありがとございます<br/><p
  class="kb-audio" id="audioplayer-59"><a href="/assets/audio/pho_kb_arigatogoza.mp3">[↓]</a></p></td></tr><tr><td>どうも<br/><p
  class="kb-audio" id="audioplayer-22"><a href="/assets/audio/st_domo.mp3">[↓]</a></p></td><td>どうも<br/><p
  class="kb-audio" id="audioplayer-60"><a href="/assets/audio/pho_kb_domo.mp3">[↓]</a></p></td></tr><tr><td>こちらこそ<br/><p
