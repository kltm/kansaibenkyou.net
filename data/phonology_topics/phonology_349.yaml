title: Sound Switching
body: <h2>“し” can become “ひ”</h2><p>In Kansai-ben, some speakers (usually older) may replace the ひ sound
  in a word with a し sound. For example, standard “shichi” may become “hichi” in Kansai-ben.</p><h2>“z”
  can become “d”</h2><p>For some older people in certain parts, such as Wakayama, the “z” sound used in
  some words may become “d.” For example, the standard “zenzen” would become “denden.”</p>
