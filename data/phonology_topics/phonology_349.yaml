title: Sound Switching
body: '“し” can become “ひ”

  In Kansai-ben, some speakers (usually older) may replace the ひ sound in a word with a し sound. For example,
  standard “shichi” may become “hichi” in Kansai-ben.

  “z” can become “d”

  For some older people in certain parts, such as Wakayama, the “z” sound used in some words may become
  “d.” For example, the standard “zenzen” would become “denden.”'
