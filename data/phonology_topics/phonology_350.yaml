title: Dropping “う”
body: 'In Kansai-ben, the long vowel “う” often drops. Typical of this are the te-form? of verbs, i-adjectives,
  and volitional forms. For example:

  verbs te-form

  i-adjectives te-form

  volitional form

  思うて

  早うて

  行こう

  思　て

  早　て

  行こ

  Besides the above, there are many cases where the “う” drops such as “やろう→やろ,” “そうや→そや,” and “Vてもうた→Vてもた.”'
