# Provenance record for link-rot fixes applied directly to the page
# YAML. Last checked: 2026-06-11.
#
# Keiko green-lit mutating fixes for provably bad or malicious content
# (2026-06-11), so these anchors were rewritten in data/pages/page_3.yaml
# and data/pages/page_398.yaml themselves — each carries
# class="kb-linkrot" + data-kb-note, and CSS in assets/css/custom.css
# renders the note as a visible " [note]" suffix. This file is NOT
# consumed by any layout; it records what each original URL was, what
# replaced it, and why, so the change survives future re-imports and
# drift triage. check_text_drift.py will report pages 3 and 398 as
# divergent from the mothball — that is this fix, not a regression.
#
# Fields:
#   url         — original href exactly as it appeared in the mothball
#   replacement — new href: live relocation or web.archive.org snapshot
#   note        — visible annotation rendered after the link
#   reason      — why the original is unusable (maintainer-facing)
#
# Wayback snapshots were chosen as the capture closest to the 2016
# mothball that still shows the real site (some hosts were parked or
# "under construction" before they died, so a few snapshots are older).
# When a future link check finds a rotted URL with no archive and no
# relocation, deactivate it in place instead: strip the href and tag
# the anchor <a class="kb-linkrot kb-linkrot-dead" data-kb-note="...">
# (CSS already supports it).

# --- /resources/ (data/pages/page_3.yaml) ---

- url: http://www6.ninjal.ac.jp/siryokan_data/hogendanwa_db/list04.htm
  replacement: https://mmsrv.ninjal.ac.jp/hogendanwa_db/list04/index.html
  note: link updated, 2026
  reason: >-
    www6.ninjal.ac.jp was retired (host no longer resolves). The same
    database page — 日本のふるさとことば集成〜近畿〜, with the サンプル
    audio — now lives at NINJAL's mmsrv host; title matches the
    original verbatim. Live relocation, not an archive copy.

- url: http://homepage2.nifty.com/GANSO_hirokun/kouza00.html
  replacement: https://web.archive.org/web/20240913102849/http://hirokun.o.oo7.jp/kouza00.html
  note: archive.org copy, 2024
  reason: >-
    @nifty's homepage2 service closed in late 2016 and the site's
    relocation host (hirokun.o.oo7.jp / LaCoocan) shut down around
    October 2025. The original URL was never captured by the Wayback
    Machine; this snapshot is the relocated copy of the same
    関西弁基礎講座 table of contents (51 lecture links).

- url: http://www.osakaben.jp/
  replacement: https://web.archive.org/web/20150624154936/http://www.osakaben.jp/
  note: archive.org copy, 2015
  reason: >-
    Domain no longer resolves, and was already parked ("This website is
    for sale!") by mid-2016. The 2015-06 capture is the last real
    全国大阪弁普及協会 (NAPOD) site.

- url: http://www.geocities.jp/immanuel_wa/hoby/osakaben/osakaben.htm
  replacement: https://web.archive.org/web/20160526220105/http://www.geocities.jp/immanuel_wa/hoby/osakaben/osakaben.htm
  note: archive.org copy, 2016
  reason: >-
    Yahoo! Geocities Japan closed in March 2019. The 2016-05 capture
    shows the full わたさんの大阪弁アクセント講座 page.

- url: http://www.kansai.gr.jp/
  replacement: https://web.archive.org/web/20120112174518/http://www.kansai.gr.jp/
  note: archive.org copy, 2012
  reason: >-
    Domain no longer resolves. The site showed only a 準備中 placeholder
    from early 2016 onward; the 2012-01 capture is the last full
    "Kansai Window" portal. Appeared twice on the resources page (both
    occurrences rewritten).

- url: http://www.kansai.gr.jp/ku/index.html
