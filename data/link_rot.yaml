  note: archive.org copy, 2011
  reason: >-
    Kansai Unity (関西広域機構) page; last working capture is 2011-09 —
    it was already gone well before the 2016 mothball. Appeared twice
    on the resources page (both occurrences rewritten).

- url: http://www.kansai-japan.net/en/
  replacement: https://web.archive.org/web/20160601135516/http://www.kansai-japan.net/en/
  note: archive.org copy, 2016
  reason: >-
    Domain hijacked — now serves an Osaka hostess-club ad site on a 404
